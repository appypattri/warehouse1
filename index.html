function buildSavedConfigs(){
  if(!S.boxConfigs||!S.boxConfigs.length){
    return '<div style="color:var(--hx);font-size:13px">No saved configs yet. Set up a calculation above and click "Save Config".</div>';
  }
  return S.boxConfigs.map(function(c,i){
    var details=[];
    if(c.invIdx!=null&&S.inv[c.invIdx]){
      var d=S.inv[c.invIdx].name;
      if(c.invWt)d+=' — '+c.invWt+' per pkt';
      if(c.invWtLabel)d+=' ('+c.invWtLabel+')';
      if(c.invPcs)d+=', '+c.invPcs+' '+(c.invPcsLabel||'pcs')+'/pkt';
      details.push(d);
    }
    if(c.pktIdx!=null&&S.pkt[c.pktIdx])details.push('Pkt: '+S.pkt[c.pktIdx].name+' ('+S.pkt[c.pktIdx].type+')');
    details.push(c.perBox+' pkt/box');
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--S2);border:1px solid var(--bd);border-radius:var(--R);margin-bottom:8px">'
      +'<span style="font-size:16px">📦</span>'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:500">'+c.name+'</div>'
      +'<div style="font-size:11px;color:var(--hx);margin-top:2px">'+details.join(' · ')+'</div></div>'
      +'<button class="btn xs te" onclick="loadBCConfig('+i+')">Load</button>'
      +'<button class="btn xs dn" onclick="deleteBCConfig('+i+')">🗑</button>'
      +'</div>';
  }).join("");
}

function calcBoxes(){
  var el=document.getElementById("bc-result");
  if(!el)return;

  var perBox=parseFloat((document.getElementById("bc-perbox")||{value:0}).value)||0;
  if(!perBox){el.innerHTML='';return;}

  // ── Product inputs
  var invIdx=(document.getElementById("bc-inv")||{value:""}).value;
  var invWt=parseFloat((document.getElementById("bc-inv-wt")||{value:0}).value)||0;
  var invWtLabel=(document.getElementById("bc-inv-wt-label")||{value:""}).value.trim();
  var invPcs=parseFloat((document.getElementById("bc-inv-pcs")||{value:0}).value)||0;
  var invPcsLabel=(document.getElementById("bc-inv-pcs-label")||{value:""}).value.trim()||"piece";

  var invStock=0,invUnit="",invName="";
  var invPacketsFromWt=0,invLeftoverWt=0;
  var totalPiecesFromWt=0,piecesPerBox=0;

  if(invIdx!==""&&S.inv[+invIdx]){
    var ri=S.inv[+invIdx];
    invStock=ri.qty; invUnit=ri.unit; invName=ri.name;
    // Weight-based packets
    if(invWt>0){
      invPacketsFromWt=Math.floor(ri.qty/invWt);
      invLeftoverWt=Math.round((ri.qty-(invPacketsFromWt*invWt))*10000)/10000;
      // Pieces per packet
      if(invPcs>0){
        totalPiecesFromWt=invPacketsFromWt*invPcs;
        piecesPerBox=perBox*invPcs;
      }
    }
  }

  // ── Packet inputs
  var pktIdx=(document.getElementById("bc-pkt")||{value:""}).value;
  var pktEach=parseFloat((document.getElementById("bc-pkt-each")||{value:1}).value)||1;
  var pktPackets=0,pktStock=0,pktUnit="",pktName="";
  if(pktIdx!==""&&S.pkt[+pktIdx]){
    var rp=S.pkt[+pktIdx];
    pktStock=rp.qty; pktUnit=rp.unit; pktName=rp.name+' ('+rp.type+')';
    pktPackets=Math.floor(rp.qty/pktEach);
  }

  var invPackets=invPacketsFromWt; // packets from product bulk stock
  if(!invPackets&&!pktPackets){
    el.innerHTML='<div class="abar amber" style="margin-top:8px">⚠ Select at least one stock source and fill the weight per packet (for product) or select a packet.</div>';
    return;
  }

  var totalPackets=invPackets+pktPackets;
  var totalBoxes=Math.floor(totalPackets/perBox);
  var leftoverPackets=totalPackets%perBox;
  var usedInvPackets=Math.min(invPackets,totalBoxes*perBox);
  var usedPktPackets=Math.max(0,totalBoxes*perBox-invPackets);
  var usedInvStock=Math.round(usedInvPackets*invWt*10000)/10000;
  var pct=totalPackets>0?Math.min(100,Math.round(totalBoxes*perBox/totalPackets*100)):0;
  var totalPiecesInBoxes=piecesPerBox>0?totalBoxes*piecesPerBox:0;
  var totalPiecesAll=totalPiecesFromWt+(pktPackets*invPcs);

  var html='';

  // ── Big result cards
  html+='<div style="background:var(--g1);border:1px solid rgba(74,222,128,.2);border-radius:var(--RL);padding:18px;margin-top:10px">';
  // Row 1: main stats
  var cols=invPcs>0?5:4;
  html+='<div style="display:grid;grid-template-columns:repeat('+cols+',1fr);gap:12px;text-align:center;margin-bottom:14px">';
  html+='<div style="background:rgba(74,222,128,.08);border-radius:8px;padding:10px 4px">'
    +'<div style="font-family:Syne,sans-serif;font-size:28px;font-weight:800;color:var(--g2)">'+N(totalBoxes)+'</div>'
    +'<div style="font-size:11px;color:var(--hx);margin-top:4px">Complete Boxes</div></div>';
  html+='<div style="background:rgba(251,191,36,.08);border-radius:8px;padding:10px 4px">'
    +'<div style="font-family:Syne,sans-serif;font-size:28px;font-weight:800;color:var(--at)">'+N(totalPackets)+'</div>'
    +'<div style="font-size:11px;color:var(--hx);margin-top:4px">Total Packets</div></div>';
  html+='<div style="background:rgba(96,165,250,.08);border-radius:8px;padding:10px 4px">'
    +'<div style="font-family:Syne,sans-serif;font-size:28px;font-weight:800;color:var(--b2)">'+N(leftoverPackets)+'</div>'
    +'<div style="font-size:11px;color:var(--hx);margin-top:4px">Leftover Packets</div></div>';
  html+='<div style="background:rgba(192,132,252,.08);border-radius:8px;padding:10px 4px">'
    +'<div style="font-family:Syne,sans-serif;font-size:28px;font-weight:800;color:var(--p2)">'+N(totalBoxes*perBox)+'</div>'
    +'<div style="font-size:11px;color:var(--hx);margin-top:4px">Packets in Boxes</div></div>';
  // Pieces card — only shown if pieces per packet is filled
  if(invPcs>0){
    html+='<div style="background:rgba(45,212,191,.08);border-radius:8px;padding:10px 4px">'
      +'<div style="font-family:Syne,sans-serif;font-size:28px;font-weight:800;color:var(--t2)">'+N(totalPiecesInBoxes)+'</div>'
      +'<div style="font-size:11px;color:var(--hx);margin-top:4px">Total '+invPcsLabel+'s in Boxes</div></div>';
  }
  html+='</div>';

  // Progress bar
  html+='<div class="pbar" style="height:10px;margin-bottom:7px"><div class="pfill" style="width:'+pct+'%;background:var(--g2)"></div></div>';
  html+='<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--hx)">'
    +'<span>Utilisation: '+pct+'% of total packets used</span>'
    +'<span>'+N(leftoverPackets)+' packet(s) left over</span>'
    +'</div></div>';

  // ── Stock Breakdown table
  html+='<div style="margin-top:12px;background:var(--S2);border:1px solid var(--bd);border-radius:var(--R);overflow:hidden">';
  html+='<div style="padding:10px 14px;font-size:11.5px;font-weight:600;border-bottom:1px solid var(--bd);background:var(--S3)">📋 Stock Breakdown</div>';

  // Product row
  if(invIdx!==""&&invWt>0&&invName){
    html+='<div style="padding:12px 14px;border-bottom:1px solid var(--bd)">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    html+='<div style="display:flex;align-items:center;gap:7px"><span style="font-size:13px;font-weight:600">📦 '+invName+'</span><span class="bx b" style="font-size:10px">Product Stock</span></div>';
    html+='<span style="font-family:DM Mono,monospace;font-size:12px;color:var(--hx)">'+N(invStock)+' '+invUnit+' available</span></div>';

    // Weight calculation row
    html+='<div style="background:var(--S3);border-radius:6px;padding:9px 11px;margin-bottom:'+(invPcs>0?'8px':'0')+';">';
    html+='<div style="font-size:10px;font-weight:600;color:var(--at);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px">⚖ Weight calculation'+(invWtLabel?' — '+invWtLabel:'')+'</div>';
    html+='<div style="font-size:12.5px;color:var(--mx)">';
    html+='<strong style="color:var(--tx)">'+N(invStock)+'</strong> '+invUnit;
    html+=' ÷ <strong style="color:var(--tx)">'+invWt+'</strong> '+invUnit+'/packet';
    html+=' = <strong style="color:var(--at)">'+N(invPackets)+' packets</strong>';
    if(invLeftoverWt>0)html+=' <span style="color:var(--hx);font-size:11px">('+N(invLeftoverWt)+' '+invUnit+' leftover)</span>';
    html+='</div></div>';

    // Pieces calculation row (only if filled)
    if(invPcs>0){
      html+='<div style="background:var(--S3);border-radius:6px;padding:9px 11px">';
      html+='<div style="font-size:10px;font-weight:600;color:var(--b2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px">🔢 Pieces calculation — '+invPcsLabel+'s</div>';
      html+='<div style="font-size:12.5px;color:var(--mx)">';
      html+='<strong style="color:var(--at)">'+N(invPackets)+'</strong> packets';
      html+=' × <strong style="color:var(--tx)">'+invPcs+'</strong> '+invPcsLabel+'s/packet';
      html+=' = <strong style="color:var(--b2)">'+N(totalPiecesFromWt)+' '+invPcsLabel+'s</strong> total';
      html+='<br><span style="font-size:11px;color:var(--hx)">Per box: '+N(perBox)+' packets × '+invPcs+' '+invPcsLabel+'s = <strong style="color:var(--t2)">'+N(piecesPerBox)+' '+invPcsLabel+'s per box</strong></span>';
      html+='</div></div>';
    }
    html+='</div>';
  }

  // Packet row
  if(pktIdx!==""&&pktName){
    html+='<div style="padding:12px 14px;border-bottom:1px solid var(--bd)">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    html+='<div style="display:flex;align-items:center;gap:7px"><span style="font-size:13px;font-weight:600">🗂 '+pktName+'</span><span class="bx a" style="font-size:10px">Packet Stock</span></div>';
    html+='<span style="font-family:DM Mono,monospace;font-size:12px;color:var(--hx)">'+N(pktStock)+' '+pktUnit+' available</span></div>';
    html+='<div style="font-size:12.5px;color:var(--mx)">';
    html+='<strong style="color:var(--tx)">'+N(pktStock)+'</strong> packets';
    html+=' ÷ '+pktEach+' = <strong style="color:var(--at)">'+N(pktPackets)+' units</strong> for boxing';
    html+='</div></div>';
  }

  // Combined total row
  html+='<div style="padding:12px 14px;background:rgba(74,222,128,.05)">';
  html+='<div style="font-size:12px;font-weight:600;color:var(--g2);margin-bottom:7px">✅ Combined Result</div>';
  if(invPackets>0&&pktPackets>0){
    html+='<div style="font-size:12px;color:var(--mx);margin-bottom:5px">';
    html+='Product packets: <strong style="color:var(--at)">'+N(invPackets)+'</strong>';
    html+=' + Packet stock: <strong style="color:var(--at)">'+N(pktPackets)+'</strong>';
    html+=' = <strong style="color:var(--at)">'+N(totalPackets)+' total packets</strong></div>';
  }
  html+='<div style="font-size:13px;color:var(--mx)">';
  html+='<strong style="color:var(--at)">'+N(totalPackets)+'</strong> packets';
  html+=' ÷ <strong style="color:var(--tx)">'+N(perBox)+'</strong> per box';
  html+=' = <strong style="color:var(--g2)">'+N(totalBoxes)+' complete boxes</strong>';
  if(leftoverPackets>0)html+=' + <strong style="color:var(--b2)">'+N(leftoverPackets)+' leftover packets</strong>';
  html+='</div>';
  if(invPcs>0&&totalPiecesInBoxes>0){
    html+='<div style="font-size:12px;color:var(--hx);margin-top:6px;padding-top:6px;border-top:1px solid var(--bd)">';
    html+='<strong style="color:var(--t2)">'+N(totalBoxes)+'</strong> boxes';
    html+=' × <strong style="color:var(--t2)">'+N(piecesPerBox)+'</strong> '+invPcsLabel+'s/box';
    html+=' = <strong style="color:var(--t2)">'+N(totalPiecesInBoxes)+' '+invPcsLabel+'s</strong> packed in boxes';
    if(totalPiecesAll>totalPiecesInBoxes){
      html+='<span style="color:var(--hx)"> ('+N(totalPiecesAll-totalPiecesInBoxes)+' '+invPcsLabel+'s leftover)</span>';
    }
    html+='</div>';
  }
  if(usedInvStock>0&&invName){
    html+='<div style="font-size:11px;color:var(--hx);margin-top:5px">';
    html+='Product stock consumed: <strong>'+N(usedInvStock)+'</strong> '+invUnit+' ('+N(usedInvPackets)+' packets from product)';
    if(usedPktPackets>0)html+=' + <strong>'+N(usedPktPackets)+'</strong> units from packet stock';
    html+='</div>';
  }
  html+='</div></div>';
  el.innerHTML=html;
}

    add_packet:"＋",edit_packet:"✏",
    add_po:"📋",edit_po:"✏",receive_po:"✓",
    place_order:"🛍",edit_order:"✏",cancel_order:"✕",fulfill_order:"✓",dispatch_order:"🚚",
    add_vendor:"＋",edit_vendor:"✏",
    add_customer:"＋",edit_customer:"✏",
    add_lot:"🏷",
    add_pattri:"＋",edit_pattri:"✏",adjust_pattri:"±",
    add_box:"＋",edit_box:"✏",adjust_box:"±",

  html+='<div class="stat-card"><div class="stat-accent" style="background:#10b981"></div><div class="stat-lbl">This Week</div><div class="stat-val">'+weekH.length+'</div><div class="stat-hint">Last 7 days</div></div>';

function yesterday(){

  return d.toISOString().split("T")[0];
}

function fillBulkOrderFromCustomer(){
  var sel=document.getElementById("bo-cust");
  var txt=document.getElementById("bo-cust-txt");
  var toInp=document.getElementById("bo-to");
  var delName=document.getElementById("bo-del-name");
  var delPh=document.getElementById("bo-del-ph");
  if(!sel)return;
  var name=sel.value;
  if(txt)txt.value=name;
  var cust=S.customers.find(function(c){return c.name===name;});
  if(cust){
    if(toInp&&cust.city)toInp.value=cust.city;
    if(delName&&cust.contact)delName.value=cust.contact;
    if(delPh&&cust.phone)delPh.value=cust.phone;
  }
}
function fillBulkContact(type){
  var selId=type==="pickup"?"bo-pickup-sel":"bo-del-sel";
  var nameId=type==="pickup"?"bo-pickup-name":"bo-del-name";
  var phId=type==="pickup"?"bo-pickup-ph":"bo-del-ph";
  var fromId=type==="pickup"?"bo-from":"bo-to";
  var sel=document.getElementById(selId);
  if(!sel||!sel.value)return;
  var parts=sel.value.split(":");
  var name=parts[0],phone=parts.slice(1).join(":");
  var nameEl=document.getElementById(nameId);if(nameEl)nameEl.value=name;
  var phEl=document.getElementById(phId);if(phEl)phEl.value=phone;
  // Also fill from/to from dispatcher DB
  var disp=(S.dispatchers||[]).find(function(d){return d.name===name||d.contact===name;});
  if(disp){
    var fromEl=document.getElementById(fromId);
    if(fromEl){if(type==="pickup"&&disp.fromPlace)fromEl.value=disp.fromPlace;else if(type==="delivery"&&disp.toPlace)fromEl.value=disp.toPlace;}
  }
}

function buildBulkOrderRow(i){
  // Build product options
  var invOpts='<option value="">— Product (optional) —</option>'+S.inv.map(function(r,j){
    return '<option value="inv:'+j+'">'+r.name+' · '+r.lot+' ('+N(r.qty)+' '+r.unit+')</option>';
  }).join('');

function addBulkOrderRow(){
  var i=window._boRowCount++;
  var tbody=document.getElementById("bo-tbody");
  if(!tbody)return;
  var tr=document.createElement("tr");
  tr.id="bo-row-"+i;
  tr.style.borderBottom="1px solid var(--bd)";
  tr.innerHTML=buildBulkOrderRow(i).replace(/^<tr[^>]*>/,"").replace(/<\/tr>$/,"");
  tbody.appendChild(tr);
  updateBulkOrderTotal();
}

function removeBulkOrderRow(i){
  var row=document.getElementById("bo-row-"+i);
  if(row)row.remove();
  updateBulkOrderTotal();
}

function updateBulkOrderRow(i){
  var invSrc =(document.getElementById("bo-inv-"+i)||{value:""}).value;
  var pktSrc =(document.getElementById("bo-pkt-"+i)||{value:""}).value;
  var invQty =parseFloat((document.getElementById("bo-inv-qty-"+i)||{value:0}).value)||0;
  var pktQty =parseFloat((document.getElementById("bo-pkt-qty-"+i)||{value:0}).value)||0;
  var price  =parseFloat((document.getElementById("bo-price-"+i)||{value:0}).value)||0;
  var invAvailEl=document.getElementById("bo-inv-avail-"+i);
  var pktAvailEl=document.getElementById("bo-pkt-avail-"+i);
  var valEl  =document.getElementById("bo-val-"+i);
  var invInpEl =document.getElementById("bo-inv-qty-"+i);
  var pktInpEl =document.getElementById("bo-pkt-qty-"+i);

  // Product availability
  if(invSrc&&invAvailEl){
    var ref=S.inv[+invSrc.split(':')[1]];
    if(ref){
      invAvailEl.textContent="Avail: "+N(ref.qty)+" "+ref.unit;
      if(invInpEl)invInpEl.style.borderColor=invQty>ref.qty?"#ef4444":invQty>0?"#10b981":"";
    }
  } else if(invAvailEl){ invAvailEl.textContent=""; }

  // Packet availability
  if(pktSrc&&pktAvailEl){
    var ref=S.pkt[+pktSrc.split(':')[1]];
    if(ref){
      pktAvailEl.textContent="Avail: "+N(ref.qty)+" "+ref.unit;
      if(pktInpEl)pktInpEl.style.borderColor=pktQty>ref.qty?"#ef4444":pktQty>0?"#10b981":"";
    }
  } else if(pktAvailEl){ pktAvailEl.textContent=""; }

  // Row value = Packet Qty × Price only (product qty excluded from value)
  var rowVal=pktSrc&&pktQty>0?pktQty*price:0;
  if(valEl)valEl.value=rowVal>0?"₹"+N(rowVal):(pktSrc&&pktQty===0&&price>0?"₹0":"");
  updateBulkOrderTotal();
}


function updateBulkOrderTotal(){
  var total=0,itemCount=0;
  for(var i=0;i<(window._boRowCount||5);i++){
    var row=document.getElementById("bo-row-"+i);
    if(!row)continue;
    var invSrc=(document.getElementById("bo-inv-"+i)||{value:""}).value;
    var pktSrc=(document.getElementById("bo-pkt-"+i)||{value:""}).value;
    var invQty=parseFloat((document.getElementById("bo-inv-qty-"+i)||{value:0}).value)||0;
    var pktQty=parseFloat((document.getElementById("bo-pkt-qty-"+i)||{value:0}).value)||0;
    var price =parseFloat((document.getElementById("bo-price-"+i)||{value:0}).value)||0;
    // Value = packet qty × price only
    var rowVal=pktSrc&&pktQty>0?pktQty*price:0;
    if((invSrc||pktSrc)&&(invQty>0||pktQty>0)){total+=rowVal;itemCount++;}
    var valEl=document.getElementById("bo-val-"+i);
    if(valEl&&rowVal>0)valEl.value="₹"+N(rowVal);
  }
  var bar=document.getElementById("bo-total-bar");
  if(bar){
    if(itemCount>0){
      bar.innerHTML='<div class="pbox"><span style="color:var(--hx)">Rows with items: <strong style="color:var(--tx)">'+itemCount+'</strong></span>'
        +(total>0?'<span style="color:var(--hx)">Order Total: <strong style="color:var(--g2)">₹'+N(total)+'</strong></span>':'')+'</div>';
    } else { bar.innerHTML=""; }
  }
}


function updateBulkBoxInfo(){
  var bIdx=(document.getElementById("bo-box-type")||{value:""}).value;
  var bQty=parseFloat((document.getElementById("bo-box-qty")||{value:0}).value)||0;
  var infoEl=document.getElementById("bo-box-info");
  if(!infoEl)return;
  if(bIdx===""||!bQty){infoEl.innerHTML="";return;}
  var box=S.boxes[+bIdx];
  if(!box){infoEl.innerHTML="";return;}
  var avail=box.qty;
  var afterQty=avail-bQty;
  var col=afterQty<0?"var(--r2)":afterQty<5?"var(--y2)":"var(--g2)";
  infoEl.innerHTML='<span style="color:var(--hx)">'+box.name+'</span>'
    +' · In stock: <strong style="color:var(--at)">'+N(avail)+'</strong>'
    +' · After order: <strong style="color:'+col+'">'+N(afterQty)+'</strong>'
    +(afterQty<0?' <span style="color:var(--r2)">⚠ Insufficient box stock!</span>':'')
    +(box.capacity?' · Capacity: <strong>'+box.capacity+'</strong> items/box':'');
}

function saveBulkOrder(){
  var ordId=(document.getElementById("bo-id")||{value:""}).value.trim()||("ORD-"+String(S.seq).padStart(4,"0"));
  var custSel=(document.getElementById("bo-cust")||{value:""}).value.trim();
  var custTxt=(document.getElementById("bo-cust-txt")||{value:""}).value.trim();
  var cust=custSel||custTxt;
  var date=(document.getElementById("bo-date")||{value:""}).value||window.today();
  var status=(document.getElementById("bo-status")||{value:"pending"}).value;
  var notes=(document.getElementById("bo-notes")||{value:""}).value.trim();
  var boExpiry=(document.getElementById("bo-expiry")||{value:""}).value;
  var boAppt=(document.getElementById("bo-appt")||{value:""}).value;
  var boDispatch=(document.getElementById("bo-dispatch-date")||{value:""}).value;
  var boFrom=(document.getElementById("bo-from")||{value:""}).value.trim();
  var boTo=(document.getElementById("bo-to")||{value:""}).value.trim();
  var boPickupName=(document.getElementById("bo-pickup-name")||{value:""}).value.trim();
  var boPickupPh=(document.getElementById("bo-pickup-ph")||{value:""}).value.trim();
  var boDelName=(document.getElementById("bo-del-name")||{value:""}).value.trim();
  var boDelPh=(document.getElementById("bo-del-ph")||{value:""}).value.trim();
  var bIdx=(document.getElementById("bo-box-type")||{value:""}).value;
  var bQty=parseFloat((document.getElementById("bo-box-qty")||{value:0}).value)||0;

  if(!cust){toast("Customer name required","warn");return;}
  if(cust.length>200){toast("Customer name too long","warn");return;}
  if(bIdx!==""&&bQty>0){var box=S.boxes[+bIdx];if(box&&bQty>box.qty){toast("⚠ Not enough boxes — only "+N(box.qty)+" available","warn");return;}}

  var items=[],errors=[],totalVal=0;
  for(var i=0;i<(window._boRowCount||5);i++){
    var row=document.getElementById("bo-row-"+i);
    if(!row)continue;
    var invSrc=(document.getElementById("bo-inv-"+i)||{value:""}).value;
    var pktSrc=(document.getElementById("bo-pkt-"+i)||{value:""}).value;
    var invQty=parseFloat((document.getElementById("bo-inv-qty-"+i)||{value:0}).value)||0;
    var pktQty=parseFloat((document.getElementById("bo-pkt-qty-"+i)||{value:0}).value)||0;
    var price =parseFloat((document.getElementById("bo-price-"+i)||{value:0}).value)||0;
    if(!invSrc&&!pktSrc)continue;
    if(invQty<=0&&pktQty<=0)continue;

    var pName="",pLot="",pType="",invUnit="",pktUnit="";
    var invRef=null,pktRef=null;
    if(invSrc){invRef=S.inv[+invSrc.split(':')[1]];if(invRef){pName=invRef.name;pLot=invRef.lot;invUnit=invRef.unit;}}
    if(pktSrc){pktRef=S.pkt[+pktSrc.split(':')[1]];if(pktRef){pType=pktRef.type;pktUnit=pktRef.unit;if(!pName)pName=pktRef.name;}}

    if(invSrc&&!invRef){errors.push("Row "+(i+1)+": invalid product");continue;}
    if(pktSrc&&!pktRef){errors.push("Row "+(i+1)+": invalid packet");continue;}
    if(invRef&&invQty>invRef.qty){errors.push("Row "+(i+1)+": product "+pName+" — only "+N(invRef.qty)+" "+invUnit+" avail");continue;}
    if(pktRef&&pktQty>pktRef.qty){errors.push("Row "+(i+1)+": packet "+pktRef.name+" — only "+N(pktRef.qty)+" "+pktUnit+" avail");continue;}

    // Value = packet qty × price only (product qty tracks stock, not value)
    var rowQty=(invRef&&invQty>0?invQty:0)+(pktRef&&pktQty>0?pktQty:0);
    var rowVal=pktRef&&pktQty>0?pktQty*price:0;
    items.push({
      invSrcKey:invSrc,pktSrcKey:pktSrc,
      product:pName,lot:pLot,pktType:pType,
      orderType:invSrc&&pktSrc?"product+packet":invSrc?"product":"packet",
      invQty:invRef&&invQty>0?invQty:0,invUnit:invUnit,
      pktQty:pktRef&&pktQty>0?pktQty:0,pktUnit:pktUnit,
      qty:rowQty,unit:invUnit||pktUnit,
      price:price,value:rowVal,
      stockAfter:invRef?invRef.qty-invQty:0
    });
    totalVal+=rowVal; // rowVal already = pktQty × price
  }

  if(errors.length){toast("⚠ "+errors.slice(0,3).join(" | "),"warn");return;}
  if(!items.length){toast("Add at least one item with product or packet and quantity","warn");return;}

  // ── Deduct stock
  items.forEach(function(it){
    if(it.invSrcKey&&it.invQty>0){
      var r=S.inv[+it.invSrcKey.split(':')[1]];
      if(r)r.qty=Math.max(0,Math.round((r.qty-it.invQty)*1000)/1000);
      if(it.invUnit==="kg"){var pt=S.pattri.find(function(p){return p.name===it.product;});if(pt){pt.netWeight=Math.max(0,Math.round(((pt.netWeight||0)-it.invQty)*1000)/1000);}}
    }
    if(it.pktSrcKey&&it.pktQty>0){var r=S.pkt[+it.pktSrcKey.split(':')[1]];if(r)r.qty=Math.max(0,Math.round((r.qty-it.pktQty)*1000)/1000);}
  });

  // ── Box deduction
  var boxName="";
  if(bIdx!==""&&bQty>0&&S.boxes[+bIdx]){var bref=S.boxes[+bIdx];bref.qty=Math.max(0,bref.qty-bQty);boxName=bref.name;logMove("out","Box: "+bref.name,bQty,"box",ordId,"Bulk Order box usage");}

  // ── Log movements
  items.forEach(function(it){
    if(it.invQty>0)logMove("out",it.product,it.invQty,it.invUnit,ordId,"Bulk Order — "+cust);
    if(it.pktQty>0)logMove("out",it.product+" (pkt)",it.pktQty,it.pktUnit,ordId,"Bulk Order packet — "+cust);
  });

  var o={id:ordId,customer:cust,items:items,
    orderType:items[0].orderType,product:items[0].product,lot:items[0].lot,pktType:items[0].pktType,
    qty:items.reduce(function(a,it){return a+it.qty;},0),unit:items[0].unit,
    price:items[0].price,value:totalVal,
    boxType:boxName,boxQty:bQty,
    date:date,expiry:boExpiry,apptDate:boAppt,dispatchDate:boDispatch,
    fromLoc:boFrom,toLoc:boTo,
    pickupName:boPickupName,pickupPhone:boPickupPh,
    deliveryName:boDelName,deliveryPhone:boDelPh,
    status:status,delivery:"—",
    stockAfter:items[0].stockAfter,notes:notes};
  S.ord.push(o);S.seq++;
  logHistory("bulk_order",cust,"Order="+ordId+", "+items.length+" row(s), value=₹"+N(totalVal)+(boxName?", box="+boxName+"×"+bQty:""));
  closeM();schedSave();render();
  toast(ordId+" placed — "+items.length+" row(s)"+(boxName?" + "+bQty+" "+boxName:"")+" ✓","ok");
}

function copyWsId(){
  var id=window._workspaceId||window._uid||"";
  if(navigator.clipboard){navigator.clipboard.writeText(id).then(function(){toast("Workspace ID copied! ✓","ok");}).catch(function(){toast("Copy failed — select and copy manually","warn");});}
  else{toast("ID: "+id,"info");}
}

function joinWorkspace(){
  var wsId=(document.getElementById("ws-join-id")||{value:""}).value.trim();
  if(!wsId){toast("Enter a workspace ID","warn");return;}
  if(wsId===window._uid){toast("That is your own workspace ID","info");return;}
  // Try loading this workspace
  if(!_db){toast("Not connected yet","warn");return;}
  showLoad("Connecting to workspace…");
  _db.collection("warehouses").doc(wsId).get().then(function(snap){
    if(!snap.exists){showApp();toast("Workspace not found — check the ID","warn");return;}
    var d=snap.data();
    var allowed=d.allowedUsers?JSON.parse(d.allowedUsers||"[]"):[];
    if(!allowed.includes(window._uid)&&!allowed.includes(window._userEmail)){
      showApp();toast("Access denied — ask the owner to add your email ("+window._userEmail+")","warn");return;
    }
    // Save preference firmly
    try{localStorage.setItem("finest_ws_"+window._uid,wsId);}catch(e){}
    window._workspaceId=wsId;
    window._isOwner=false;
    window._wsOwnerUid=wsId; // owner uid = their workspace doc id
    // Clear local state and reload from the shared workspace
    if(window.resetToDefaults)resetToDefaults();
    showLoad("Loading shared workspace data…");
    // Load directly from the target workspace doc
    _db.collection("warehouses").doc(wsId).get().then(function(wsnap){
      if(wsnap.exists()){
        var wd=wsnap.data();
        var ks=["inv","pkt","proc","ord","lot","vendors","customers","dispatchers","movements","boxConfigs","boxes","pattri","history","allowedUsers","backups"];
        ks.forEach(function(k){if(wd[k])try{S[k]=JSON.parse(wd[k]);}catch(e){}});
        if(wd.seq)S.seq=wd.seq;
        if(wd.settings)try{Object.assign(CFG,JSON.parse(wd.settings));}catch(e){}
        // Sanitise
        ["inv","pkt","proc","ord","lot","vendors","customers","dispatchers","movements","boxConfigs","boxes","pattri","history","allowedUsers","backups"].forEach(function(k){if(!Array.isArray(S[k]))S[k]=[];});
      }
      showApp();render();
      toast("✓ Joined workspace! Shared data loaded.","ok");
    }).catch(function(e){showApp();render();toast("Load error: "+e.message,"warn");});
  }).catch(function(e){
    showApp();toast("Error: "+e.message,"warn");
  });
}

function transferAdmin(){
  var email=(document.getElementById("ws-transfer-email")||{value:""}).value.trim();
  if(!email){toast("Select a member to transfer to","warn");return;}
  if(!confirm("Transfer full admin ownership to "+email+"? They become the new workspace owner. You will become a regular member."))return;
  // The new admin's UID must be known — store their email as newOwner flag
  // Approach: store a "pendingTransfer" field; new admin claims it on next load
  if(!_db){toast("Not connected","warn");return;}
  var payload={pendingTransfer:email,pendingTransferFrom:window._userEmail||window._uid};
  _db.collection("warehouses").doc(window._workspaceId).set(payload,{merge:true})
    .then(function(){
      // Add current owner to allowedUsers so they keep access
      if(!S.allowedUsers)S.allowedUsers=[];
      var myEmail=window._userEmail||"";
      if(myEmail&&!S.allowedUsers.includes(myEmail))S.allowedUsers.push(myEmail);
      schedSave();
      toast("Transfer request sent to "+email+". They must open the app to accept.","ok");
      logHistory("transfer_admin",email,"admin transfer initiated");
      render();
    }).catch(function(e){toast("Error: "+e.message,"warn");});
}

function leaveWorkspace(){
  if(!confirm("Leave this workspace and switch back to your own data?"))return;
  try{localStorage.removeItem("finest_ws_"+window._uid);}catch(e){}
  window._workspaceId=window._uid;window._isOwner=true;
  if(window.resetToDefaults)resetToDefaults();
  _loadData(window._uid);
  toast("Switched back to your own workspace","info");
}

function addTeamMember(){
  var email=(document.getElementById("ws-add-email")||{value:""}).value.trim().toLowerCase();
  if(!email||!email.includes("@")){toast("Enter a valid email","warn");return;}
  if(!S.allowedUsers)S.allowedUsers=[];
  if(S.allowedUsers.includes(email)){toast("Already added","info");return;}
  S.allowedUsers.push(email);
  schedSave();render();toast(email+" added to team ✓","ok");
  logHistory("add_team_member",email,"granted workspace access");
}

function removeTeamMember(i){
  if(!confirm("Remove this team member?"))return;
  var removed=S.allowedUsers.splice(i,1)[0];
  schedSave();render();toast(removed+" removed","info");
  logHistory("remove_team_member",removed,"revoked workspace access");
}

function handlePDFDrop(e){

function handlePDFSelect(e){

}

function processPDFFile(file){
  var prev=document.getElementById("pdf-preview");
  var res=document.getElementById("pdf-result");
  var btn=document.getElementById("pdf-import-btn");
  if(!prev||!res)return;
  if(file.size>10*1024*1024){toast("File too large — max 10MB","warn");return;}

  prev.innerHTML='<div style="background:var(--S2);border-radius:var(--R);padding:10px 13px;font-size:12.5px;display:flex;align-items:center;gap:10px"><span style="font-size:20px">📄</span><div><div style="font-weight:500">'+file.name+'</div><div style="color:var(--hx);font-size:11px">'+Math.round(file.size/1024)+'KB · '+file.type+'</div></div></div>';
  res.innerHTML='<div style="text-align:center;padding:20px;color:var(--hx)"><div class="spin" style="margin:0 auto 10px"></div><div style="font-size:13px">🤖 AI is reading your document…</div><div style="font-size:11px;margin-top:4px">Extracting products, quantities, prices, customer details</div></div>';
  if(btn)btn.style.display="none";
  window._pdfExtracted=null;

  var reader=new FileReader();
  reader.onload=function(ev){
    var b64=ev.target.result.split(",")[1];
    var mediaType=file.type||"application/pdf";
    var isPDF=file.name.toLowerCase().endsWith(".pdf")||mediaType==="application/pdf";

    var msgContent=[
      {type:"text",text:`You are a warehouse management AI assistant. Extract all data from this business document (invoice, purchase order, delivery note, or receipt).

Return ONLY a valid JSON object with these fields (use null if not found):
{
  "docType": "invoice|po|delivery_note|receipt|other",
  "docNumber": "document/invoice/PO number",
  "docDate": "YYYY-MM-DD format or null",
  "vendor": "supplier/vendor company name",
  "customer": "buyer/customer company name",
  "customerAddress": "full address if available",
  "customerPhone": "phone number if available",
  "customerEmail": "email if available",
  "items": [
    {
      "name": "product name",
      "qty": 0,
      "unit": "kg|pcs|box|litre etc",
      "unitPrice": 0,
      "totalValue": 0,
      "lotNumber": "lot/batch number if mentioned",
      "description": "any additional description"
    }
  ],
  "subtotal": 0,
  "tax": 0,
  "totalAmount": 0,
  "currency": "INR|USD|etc",
  "paymentTerms": "payment terms if mentioned",
  "notes": "any other important notes"
}

Be thorough — extract every product line item. If quantities or prices are missing use 0.`},
      isPDF
        ? {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}}
        : {type:"image",source:{type:"base64",media_type:mediaType,data:b64}}
    ];

    // Note: requires anthropic-dangerous-direct-browser-access header for browser-side calls
    // Try Anthropic API — works in claude.ai context; on external hosting shows manual entry
    var apiHeaders={
      "Content-Type":"application/json",
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    };
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:apiHeaders,
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:2000,
        messages:[{role:"user",content:msgContent}]
      })
    }).then(function(r){
      if(!r.ok)return r.json().then(function(e){throw new Error((e.error&&e.error.message)||r.status);});
      return r.json();
    }).then(function(data){
      var text=(data.content&&data.content[0]&&data.content[0].text)||"";
      text=text.replace(/```json|```/g,"").trim();
      var m=text.match(/\{[\s\S]*\}/);
      if(!m){res.innerHTML='<div class="abar red">⚠ Could not extract data. Try a clearer image or use Manual Entry below.</div>'+showManualEntryForm();return;}
      try{
        var ext=JSON.parse(m[0]);
        window._pdfExtracted=ext;
        showPDFExtracted(ext);
        if(btn)btn.style.display="inline-flex";
      }catch(pe){res.innerHTML='<div class="abar red">⚠ Parse error: '+pe.message+'</div>'+showManualEntryForm();}
    }).catch(function(e){
      var msg=e.message||String(e)||"unknown error";
      var isNetwork=msg.toLowerCase().includes("fetch")||msg.toLowerCase().includes("network")||msg.toLowerCase().includes("failed")||msg.toLowerCase().includes("cors");
      res.innerHTML='<div class="abar amber" style="margin-bottom:8px">'
        +(isNetwork
          ?'📡 <strong>Direct AI access blocked by browser security (CORS).</strong><br>'
           +'<span style="font-size:12px">This is a browser security restriction — the Anthropic API cannot be called directly from an external website.<br>'
           +'<strong>Solutions:</strong> (1) Use the Manual Entry form below to enter invoice data, or (2) Open this app in the Claude.ai environment.</span>'
          :'⚠ AI error: '+msg+'.<br>Use Manual Entry below to enter data manually.')
        +'</div>'
        +'<div style="font-size:11px;color:var(--hx);padding:6px 0">Error details: '+msg+'</div>'
        +showManualEntryForm();
      if(btn)btn.style.display="none";
    });
  };
  reader.readAsDataURL(file);
}

    ext.items.forEach(function(it){
      h+='<tr class="dr"><td><strong>'+it.name+'</strong>'+(it.description?'<div style="font-size:10.5px;color:var(--hx)">'+it.description+'</div>':'')+'</td>'
        +'<td>'+N(it.qty||0)+'</td><td class="d">'+(it.unit||"—")+'</td>'

  h+='<strong style="color:var(--tx)">What will be imported:</strong><br>';
  if(ext.docType==="po"||ext.docType==="invoice"){h+='• New PO record added to Procurement<br>';}
  h+='• Each item added as an Order record (stock deducted) OR as a PO receive (stock added)<br>';

  h+='<label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="radio" name="pdf-mode" value="order" checked> 🛍 Import as <strong>Customer Order</strong> (deducts stock)</label>';
  h+='<label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="radio" name="pdf-mode" value="po"> 📋 Import as <strong>Purchase Order</strong> (adds stock)</label>';

function confirmPDFImport(){
  var ext=window._pdfExtracted;
  if(!ext||!ext.items||!ext.items.length){toast("No data to import","warn");return;}
  var mode=document.querySelector("input[name=pdf-mode]:checked");
  var importMode=mode?mode.value:"order";
  var date=ext.docDate||window.today();
  var totalImported=0;

  if(importMode==="order"){
    // Import as customer orders
    var custName=ext.customer||"Unknown Customer";
    // Add customer if not exists
    var existCust=S.customers.find(function(c){return c.name.toLowerCase()===custName.toLowerCase();});
    if(!existCust&&ext.customer){
      S.customers.push({id:"C"+uid(),name:custName,contact:"",phone:ext.customerPhone||"",email:ext.customerEmail||"",city:ext.customerAddress||"",creditDays:0,notes:"Auto-added from PDF import"});
    }
    var ordId="ORD-"+String(S.seq).padStart(4,"0");
    var items=ext.items.map(function(it){
      // Try to match product in inventory
      var matchInv=S.inv.find(function(r){return r.name.toLowerCase().includes((it.name||"").toLowerCase().substring(0,5));});
      var srcKey=matchInv?"inv:"+S.inv.indexOf(matchInv):"";
      if(matchInv&&it.qty>0){
        matchInv.qty=Math.max(0,matchInv.qty-it.qty);
        logMove("out",matchInv.name,it.qty,it.unit||matchInv.unit,ordId,"PDF Invoice Import");
      }
      return{srcKey:srcKey,product:it.name,lot:it.lotNumber||"",pktType:"",orderType:"product",qty:it.qty||0,unit:it.unit||"pcs",price:it.unitPrice||0,value:it.totalValue||0,stockAfter:matchInv?matchInv.qty:0};
    });
    var o={id:ordId,customer:custName,items:items,orderType:"product",product:items[0]?items[0].product:"",lot:"",pktType:"",qty:items.reduce(function(a,it){return a+it.qty;},0),unit:items[0]?items[0].unit:"",price:0,value:ext.totalAmount||0,boxType:"",boxQty:0,date:date,status:"fulfilled",delivery:"delivered",stockAfter:0,notes:"Imported from PDF: "+(ext.docNumber||"")};
    S.ord.push(o);S.seq++;
    logHistory("pdf_import_order",custName,"Doc="+ext.docNumber+", "+items.length+" items from PDF");
    totalImported=items.length;
    toast(ordId+" created from PDF — "+items.length+" item(s) imported ✓","ok");
  }else{
    // Import as PO
    var vendorName=ext.vendor||"Unknown Vendor";
    var existVen=S.vendors.find(function(v){return v.name.toLowerCase().includes(vendorName.toLowerCase().substring(0,5));});
    if(!existVen&&ext.vendor){
      S.vendors.push({id:"V"+uid(),name:vendorName,contact:"",phone:"",email:"",city:"",terms:ext.paymentTerms||"",rating:0,notes:"Auto-added from PDF import"});
    }
    ext.items.forEach(function(it){
      var po={po:ext.docNumber||"—",vendor:vendorName,qty:(it.qty||0)+" "+(it.unit||"pcs"),poDate:date,due:"—",grn:date,aging:"0d",status:"RECEIVED",flag:"On Time",paid:false,notes:"PDF Import: "+it.name+(it.description?" — "+it.description:"")};
      S.proc.push(po);
      // Add to inventory
      var matchInv=S.inv.find(function(r){return r.name.toLowerCase().includes((it.name||"").toLowerCase().substring(0,5));});
      if(matchInv&&it.qty>0){
        matchInv.qty+=it.qty;
        logMove("in",matchInv.name,it.qty,it.unit||matchInv.unit,ext.docNumber||"PDF","PDF PO Import");
      } else if(it.qty>0){
        S.inv.push({id:"P"+uid(),name:it.name,lot:it.lotNumber||"PDF-IMPORT",cat:"Product",qty:it.qty,minQty:CFG.lowThresh,unit:it.unit||"pcs",mfd:"",exp:"",cost:it.unitPrice||0});
        logMove("in",it.name,it.qty,it.unit||"pcs",ext.docNumber||"PDF","PDF PO Import — new product");
      }
      totalImported++;
    });
    logHistory("pdf_import_po",vendorName,"Doc="+ext.docNumber+", "+ext.items.length+" items from PDF");
    toast("PO imported from PDF — "+totalImported+" item(s) processed ✓","ok");
  }
  closeM();schedSave();render();
}

      html+='</div></td>';

  html+='⚠ <strong>Restoring a backup replaces ALL current data.</strong> Always create a backup of your current data before restoring an older one.';
  html+='</div>';

}

function createBackup(){
  var label=(document.getElementById("bk-label")||{value:""}).value.trim();
  var now=new Date();
  var snap={};
  ["inv","pkt","proc","ord","lot","vendors","customers","movements","boxConfigs","boxes","pattri","history","allowedUsers"].forEach(function(k){
    snap[k]=JSON.parse(JSON.stringify(S[k]||[]));
  });
  snap.seq=S.seq;
  var recordCount=S.inv.length+S.pkt.length+S.proc.length+S.ord.length+S.vendors.length+S.customers.length+S.boxes.length+S.pattri.length;
  var bk={
    id:"BK-"+Date.now(),
    label:label||"Backup "+now.toLocaleDateString("en-IN"),
    date:now.toISOString().split("T")[0],
    time:now.toTimeString().slice(0,8),
    datetime:now.toISOString(),
    user:window._userName||"Unknown",
    email:window._userEmail||"",
    recordCount:recordCount,
    data:snap
  };
  if(!S.backups)S.backups=[];
  S.backups.push(bk);
  // Keep max 20 cloud backups
  if(S.backups.length>20)S.backups=S.backups.slice(S.backups.length-20);
  logHistory("create_backup",label||"Backup","records="+recordCount+", time="+bk.time);
  schedSave();
  if(TAB==="backup")render();
  toast("Backup created: "+(label||bk.label)+" ✓","ok");
}

function deleteBackup(i){
  var bk=(S.backups||[])[i];
  if(!bk)return;
  if(!confirm("Delete backup: "+(bk.label||bk.date)+"?\n\nThis cannot be undone."))return;
  S.backups.splice(i,1);
  schedSave();render();toast("Backup deleted","info");
}

function restoreBackup(i){
  var bk=(S.backups||[])[i];
  if(!bk){toast("Backup not found","warn");return;}
  if(!confirm("⚠ RESTORE BACKUP?\n\nLabel: "+(bk.label||"—")+"\nDate: "+bk.date+" "+bk.time+"\nCreated by: "+bk.user+"\n\nThis will REPLACE ALL current data with this backup.\n\nRecommended: create a backup of current data first.\n\nAre you sure?"))return;
  // First create auto-backup of current state
  createBackup();
  // Then restore
  var d=bk.data||{};
  ["inv","pkt","proc","ord","lot","vendors","customers","movements","boxConfigs","boxes","pattri","history","allowedUsers"].forEach(function(k){
    if(d[k])S[k]=JSON.parse(JSON.stringify(d[k]));
  });
  if(d.seq)S.seq=d.seq;
  logHistory("restore_backup",bk.label||bk.date,"restored from backup by "+window._userName);
  schedSave();render();
  toast("Restored: "+(bk.label||bk.date)+" ✓ (auto-backup of previous data created)","ok");
}

function importJSONBackup(){
  var input=document.createElement("input");
  input.type="file";input.accept=".json,application/json";
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var d=JSON.parse(ev.target.result);
        // Handle both full export and backup.data format
        var data=d.data||d;
        if(!data.inv&&!data.pkt&&!data.ord){toast("Invalid backup file — no recognizable data found","warn");return;}
        var recordCount=(data.inv||[]).length+(data.pkt||[]).length+(data.ord||[]).length;
        if(!confirm("Import backup file: "+file.name+"\n\nRecords found: "+recordCount+"\n\nThis will REPLACE all current data.\n\nCurrent data will be auto-saved as a backup first.\n\nContinue?"))return;
        // Auto-backup current
        createBackup();
        // Restore
        ["inv","pkt","proc","ord","lot","vendors","customers","movements","boxConfigs","boxes","pattri","history","allowedUsers"].forEach(function(k){
          if(data[k])S[k]=JSON.parse(JSON.stringify(data[k]));
        });
        if(data.seq)S.seq=data.seq;
        logHistory("import_backup_json","File: "+file.name,"records="+recordCount);
        schedSave();render();
        toast("Backup imported from "+file.name+" ✓","ok");
      }catch(err){toast("Error reading file: "+err.message,"warn");}
    };
    reader.readAsText(file);
  };
  input.click();
}

function doRecvLotStock(li){
  var l=S.lot[li];if(!l)return;
  var lotCode=(document.getElementById("rl-lot")||{value:""}).value;
  var qty=parseFloat((document.getElementById("rl-qty")||{value:0}).value)||0;
  var unit=(document.getElementById("rl-unit")||{value:"kg"}).value;
  var mfd=(document.getElementById("rl-mfd")||{value:""}).value;
  var exp=(document.getElementById("rl-exp")||{value:""}).value;
  var note=(document.getElementById("rl-note")||{value:""}).value.trim();
  if(!qty){toast("Enter a quantity","warn");return;}
  if(!lotCode){toast("Select a lot","warn");return;}

  _pushUndo("Lot receive stock",["inv","lot","pattri"]);

  // Update lot dates and received quantity
  if(!l.lotDates)l.lotDates={};
  var existLd=l.lotDates[lotCode]||{};
  l.lotDates[lotCode]={
    mfd:mfd||existLd.mfd||"",
    exp:exp||existLd.exp||"",
    receivedQty:(existLd.receivedQty||0)+qty,
    receivedUnit:unit,
    lastReceivedDate:window.today()
  };

  // Feature 2: Find matching product in inventory and add qty
  var invProd=S.inv.find(function(p){return p.name===l.name;});
  if(invProd){
    var prevQty=invProd.qty;
    invProd.qty=Math.round((prevQty+qty)*1000)/1000;
    // Feature 3: sync lot code and dates to product if this is current lot
    if(lotCode===l.current){
      invProd.lot=lotCode;
      if(mfd)invProd.mfd=mfd;
      if(exp)invProd.exp=exp;
    }
    logMove("in",l.name,qty,unit,"Lot Recv "+lotCode,(note||"Lot stock received")+" ("+prevQty+"→"+invProd.qty+")");
    // Also update pattri if kg
    if(unit==="kg"){
      var pt=S.pattri.find(function(p){return p.name===l.name;});
      if(pt){pt.netWeight=Math.round(((pt.netWeight||0)+qty)*1000)/1000;}
    }
    toast(l.name+": "+N(qty)+" "+unit+" received for lot "+lotCode+" → product stock now "+N(invProd.qty)+" ✓","ok");
  } else {
    // Create new inventory entry
    S.inv.push({id:"P"+uid(),name:l.name,lot:lotCode,cat:"Product",qty:qty,minQty:CFG.lowThresh,unit:unit,mfd:mfd||"",exp:exp||"",cost:0});
    logMove("in",l.name,qty,unit,"Lot Recv "+lotCode,(note||"New product from lot")+" (new entry)");
    toast("New product entry created: "+l.name+" — "+N(qty)+" "+unit+" ✓","ok");
  }
  logHistory("lot_recv_stock",l.name,"lot="+lotCode+", qty="+N(qty)+" "+unit+(note?" note="+note:""));
  closeM();schedSave();render();
}

// ══════════════════════════════════════════════
function exportTable(data,name,cols){
  if(!data.length){toast("No data to export","info");return;}
  const rows=data.map(r=>cols.map(c=>`"${String(r[c]===undefined||r[c]===null?"":r[c]).replace(/"/g,'""')}"`).join(","));
  const csv=[cols.join(","),...rows].join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
  a.download=`finest_${name}_${today()}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast(`Exported ${name}.csv ✓`,"ok");
}

  proc:{po:"PO Number",vendor:"Vendor / Product",qty:"Quantity",poOpen:"PO Opening Date",poExpiry:"PO Expiry Date",poDate:"PO Order Date",due:"Due Date",grn:"GRN / Received Date",fromPlace:"Dispatched From",toPlace:"Delivered To",agentName:"Agent / Transporter",agentPhone:"Agent Phone",aging:"Aging",status:"Status",flag:"Delay Flag",paid:"Payment Status",notes:"Notes"},
  ord:{id:"Order ID",customer:"Customer",orderType:"Order Type",product:"Product",lot:"Lot Number",pktType:"Packet Type",qty:"Quantity",unit:"Unit",price:"Unit Price",value:"Total Value",date:"Order Date",status:"Status",delivery:"Delivery Status",stockAfter:"Stock After",notes:"Notes"},
  ven:{name:"Vendor Name",contact:"Contact Person",phone:"Phone",email:"Email",city:"City",terms:"Payment Terms",rating:"Rating (1-5)",notes:"Notes"},
  cust:{name:"Customer Name",contact:"Contact Person",phone:"Phone",email:"Email",city:"City",creditDays:"Credit Days",notes:"Notes"}
};

function exportTableLabeled(data,name,cols,labels){
  if(!data.length){toast("No data to export","info");return;}
  const header=cols.map(c=>labels&&labels[c]?labels[c]:c).join(",");
  const rows=data.map(r=>cols.map(c=>{
    var v=r[c];
    if(v===undefined||v===null)v="";
    if(typeof v==="boolean")v=v?"Yes":"No";
    return `"${String(v).replace(/"/g,"\"\"")}"`;
  }).join(","));
  const csv=[header,...rows].join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
  a.download=`finest_${name}_${today()}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast(`Exported ${name}.csv ✓`,"ok");
}

function importCSV(type){
  const input=document.createElement("input");
  input.type="file";input.accept=".csv";
  input.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const lines=ev.target.result.split("\n").filter(l=>l.trim());
        if(lines.length<2){toast("CSV must have header + at least 1 row","warn");return;}
        const headers=lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
        // Map header label back to field key
        const labelMap={};
        const labelsForType=EXPORT_LABELS[type]||{};
        // build reverse map: label -> key
        Object.entries(labelsForType).forEach(([k,v])=>labelMap[v.toLowerCase()]=k);
        // also allow direct key match
        headers.forEach(h=>{ if(!labelMap[h.toLowerCase()]) labelMap[h.toLowerCase()]=h; });
        
        const rows=lines.slice(1).map(line=>{
          const vals=[];let cur="",inQ=false;
          for(let i=0;i<line.length;i++){
            if(line[i]==="\""){inQ=!inQ;}
            else if(line[i]===","&&!inQ){vals.push(cur);cur="";}
            else cur+=line[i];
          }
          vals.push(cur);
          const obj={};
          headers.forEach((h,i)=>{
            const key=labelMap[h.toLowerCase()]||h;
            obj[key]=(vals[i]||"").replace(/"/g,"").trim();
          });
          return obj;
        }).filter(r=>Object.values(r).some(v=>v));

        let added=0;
        if(type==="inv"){
          rows.forEach(r=>{
            if(!r.name)return;
            const exists=S.inv.findIndex(p=>p.name===r.name&&p.lot===r.lot);
            const item={id:"P"+uid(),name:r.name||"",lot:r.lot||"",cat:r.cat||"Product",qty:parseFloat(r.qty)||0,minQty:parseFloat(r.minQty)||CFG.lowThresh,unit:r.unit||"kg",mfd:r.mfd||"",exp:r.exp||"",cost:0};
            if(exists>=0){S.inv[exists]={...S.inv[exists],...item};}else{S.inv.push(item);added++;}
          });
          toast(`Imported ${rows.length} product(s) ✓`,"ok");
        } else if(type==="pkt"){
          rows.forEach(r=>{
            if(!r.name)return;
            const exists=S.pkt.findIndex(p=>p.name===r.name&&p.type===r.type);
            const item={name:r.name||"",type:r.type||"small packets",qty:parseFloat(r.qty)||0,unit:r.unit||"pcs"};
            if(exists>=0){S.pkt[exists]={...S.pkt[exists],...item};}else{S.pkt.push(item);added++;}
          });
          toast(`Imported ${rows.length} packet type(s) ✓`,"ok");
        } else if(type==="proc"){
          rows.forEach(r=>{
            if(!r.vendor)return;
            S.proc.push({po:r.po||"—",vendor:r.vendor||"",qty:r.qty||"—",poOpen:r.poOpen||"—",poExpiry:r.poExpiry||"—",poDate:r.poDate||"—",due:r.due||"—",grn:r.grn||"—",fromPlace:r.fromPlace||"",toPlace:r.toPlace||"",agentName:r.agentName||"",agentPhone:r.agentPhone||"",aging:r.aging||"—",status:r.status||"on process",flag:r.flag||"—",paid:r.paid==="Yes"||r.paid==="1"||r.paid===true,notes:r.notes||""});
          });
          toast(`Imported ${rows.length} PO(s) ✓`,"ok");
        } else if(type==="ord"){
          rows.forEach(r=>{
            if(!r.customer)return;
            S.ord.push({id:r.id||"ORD-"+String(S.seq++).padStart(4,"0"),customer:r.customer||"",orderType:r.orderType||"product",product:r.product||"",lot:r.lot||"",pktType:r.pktType||"",qty:parseFloat(r.qty)||0,unit:r.unit||"kg",price:parseFloat(r.price)||0,value:parseFloat(r.value)||0,date:r.date||today(),status:r.status||"pending",delivery:r.delivery||"—",stockAfter:parseFloat(r.stockAfter)||0,notes:r.notes||""});
          });
          toast(`Imported ${rows.length} order(s) ✓`,"ok");
        } else if(type==="ven"){
          rows.forEach(r=>{
            if(!r.name)return;
            const exists=S.vendors.findIndex(v=>v.name===r.name);
            const item={id:"V"+uid(),name:r.name||"",contact:r.contact||"",phone:r.phone||"",email:r.email||"",city:r.city||"",terms:r.terms||"",rating:parseInt(r.rating)||0,notes:r.notes||""};
            if(exists>=0){S.vendors[exists]={...S.vendors[exists],...item};}else{S.vendors.push(item);}
          });
          toast(`Imported ${rows.length} vendor(s) ✓`,"ok");
        } else if(type==="pattri"){
          rows.forEach(function(r){
            if(!r.name)return;
            var exists=S.pattri.findIndex(function(p){return p.name===r.name;});
            var item={id:"PT"+uid(),name:r.name||"",netWeight:parseFloat(r.netWeight)||0,unit:r.unit||"kg",notes:r.notes||""};
            if(exists>=0){S.pattri[exists]={...S.pattri[exists],...item};}else{S.pattri.push(item);}
          });
          toast("Imported "+rows.length+" pattri product(s) ✓","ok");
        } else if(type==="cust"){
          rows.forEach(r=>{
            if(!r.name)return;
            const exists=S.customers.findIndex(c=>c.name===r.name);
            const item={id:"C"+uid(),name:r.name||"",contact:r.contact||"",phone:r.phone||"",email:r.email||"",city:r.city||"",creditDays:parseInt(r.creditDays)||0,notes:r.notes||""};
            if(exists>=0){S.customers[exists]={...S.customers[exists],...item};}else{S.customers.push(item);}
          });
          toast(`Imported ${rows.length} customer(s) ✓`,"ok");
        }
        schedSave();render();
      }catch(err){toast("Import error: "+err.message,"warn");}
    };
    reader.readAsText(file);
  };
  input.click();
}

function exportAll(){
  const sets=[
    [S.inv,"product_inventory",["name","lot","cat","qty","minQty","unit","mfd","exp"],EXPORT_LABELS.inv],
    [S.pkt,"packet_inventory",["name","type","qty","unit"],EXPORT_LABELS.pkt],
    [S.proc,"procurement",["po","vendor","qty","poOpen","poExpiry","poDate","due","grn","fromPlace","toPlace","agentName","agentPhone","aging","status","flag","paid","notes"],EXPORT_LABELS.proc],
    [S.ord,"orders",["id","customer","orderType","product","lot","pktType","qty","unit","price","value","date","status","delivery","stockAfter","notes"],EXPORT_LABELS.ord],
    [S.vendors,"vendors",["name","contact","phone","email","city","terms","rating","notes"],EXPORT_LABELS.ven],
    [S.customers,"customers",["name","contact","phone","email","city","creditDays","notes"],EXPORT_LABELS.cust]
  ];
  sets.forEach(([d,n,c,l],i)=>setTimeout(()=>exportTableLabeled(d,n,c,l),i*350));
}

function toast(msg,type="ok"){
  const el=document.createElement("div");
  el.className=`toast ${type}`;el.textContent=msg;
  const area=document.getElementById("toast-area");
  area.appendChild(el);
  setTimeout(()=>{el.style.opacity="0";el.style.transition="opacity .3s";setTimeout(()=>el.remove(),300);},3500);
}

// expose globals needed by module script


function removeSlfProd(idOrName){
  if(!confirm("Hide this product from the Shelf Life Tracker?\n(Product stays in inventory — this only removes it from the shelf life view)"))return;
  _pushUndo("Remove from shelf life view",["inv"]);
  var idx=S.inv.findIndex(function(r){return r.id===idOrName||r.name===idOrName;});
  if(idx>=0){
    // Instead of deleting, mark as hidden from shelf life
    S.inv[idx]._slfHidden=true;
    schedSave();render();
    toast("Hidden from Shelf Life Tracker — edit product to restore","info");
  }
}
function goToLot(productName){
  TAB="lots";
  FV.lot=productName;
  render();
  var sb=document.getElementById("sidebar");
  if(sb)sb.classList.remove("open");
}
