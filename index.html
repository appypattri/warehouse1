function _loadData(uid){
  // Check if this user has a saved workspace preference
  var savedWS=null;
  try{savedWS=localStorage.getItem("finest_ws_"+uid);}catch(e){}
  var targetId=savedWS||uid;
  window._workspaceId=targetId;
  window._isOwner=(targetId===uid);

  _db.collection("warehouses").doc(targetId).get().then(function(snap){
    if(snap.exists){
      var d=snap.data();
      // Verify this workspace allows this user (check allowedUsers array)
      var allowed=d.allowedUsers?JSON.parse(d.allowedUsers||"[]"):[];
      if(targetId!==uid && !allowed.includes(uid) && !allowed.includes(window._userEmail)){
        // Access denied — fall back to own workspace
        window._workspaceId=uid;
        window._isOwner=true;
        try{localStorage.removeItem("finest_ws_"+uid);}catch(e){}
        if(window.toast)toast("Workspace access denied — switched to your own data","warn");

      ["inv","pkt","proc","ord","lot","vendors","customers","dispatchers","movements","boxConfigs","boxes","pattri","history","allowedUsers","backups"].forEach(function(k){
        if(d[k])try{if(window.S)S[k]=JSON.parse(d[k]);}catch(e){}

      if(d.settings&&window.CFG)try{Object.assign(CFG,JSON.parse(d.settings));}catch(e){}

        if(window.toast)toast("Workspace not found","warn");

        _loadData(uid);return;

    if(window.S){
      var arrKeys=["inv","pkt","proc","ord","lot","vendors","customers","dispatchers","movements","boxConfigs","boxes","pattri","history","allowedUsers","backups"];

    }

  }).catch(function(e){

    if(window.S){["inv","pkt","proc","ord","lot","vendors","customers","dispatchers","movements","boxConfigs","boxes","pattri","history","allowedUsers","backups"].forEach(function(k){if(!Array.isArray(S[k]))S[k]=[];});}

function _saveNow(uid){
  _setSS("sv");

  if(!_db||!targetId)return;
  // Data size guard — Firestore doc limit ~1MB
  if(window.S){

    ["inv","pkt","proc","ord","lot","vendors","customers","movements","history"].forEach(function(k){
      try{sizeEst+=JSON.stringify(S[k]||[]).length;}catch(e){}
    });

    }
    // Auto-trim excess: keep only last 800 movements, 800 history
    if((S.movements||[]).length>800)S.movements=S.movements.slice(0,800);

  if(window.S){

      payload[k]=JSON.stringify(S[k]||[]);
    });
    // If owner, also save allowed users list
    if(window._isOwner&&S.allowedUsers){
      payload.allowedUsers=JSON.stringify(S.allowedUsers||[]);
    }
  }
  _db.collection("warehouses").doc(targetId).set(payload).then(function(){
    _setSS("ok");

    _setSS("er");

  });
}

  var t=(type||"").toLowerCase().trim();

  var h=0;for(var i=0;i<t.length;i++)h=(h*31+t.charCodeAt(i))&0xffffff;
  return PKT_PALETTE[Math.abs(h)%PKT_PALETTE.length];
}
function pktTypeBadge(type){
  var col=pktTypeColour(type||"");
  return'<span style="display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;background:'+col+'22;color:'+col+';border:1px solid '+col+'44">'+(type||"—")+'</span>';
}
const bx=(c,l)=>`<span class="bx ${c}">${l}</span>`;
const daysLeft=exp=>{if(!exp)return null;const d=Math.round((new Date(exp)-new Date())/(864e5));return d;};
const slfPct=(mfd,exp)=>{if(!mfd||!exp)return 0;const t=new Date(exp)-new Date(mfd),u=new Date()-new Date(mfd);return Math.min(100,Math.max(0,Math.round(u/t*100)));};
const slfColor=d=>{if(d===null)return"#555570";if(d<0)return"#ef4444";if(d<=14)return"#ef4444";if(d<=CFG.warnDays)return"#f59e0b";return"#10b981";};
const slfCls=d=>{if(d===null)return"";if(d<0||d<=14)return"exp-crit";if(d<=CFG.warnDays)return"exp-warn";return"exp-good";};

function slfBadge(d){
  if(d===null)return bx("x","No date");
  if(d<0)return bx("r","Expired");
  if(d<=7)return bx("r",d+"d left ⚠");
  if(d<=14)return bx("r",d+"d left");
  if(d<=CFG.warnDays)return bx("y",d+"d left");
  return bx("g",d+"d left");
}
function slfBar(d,mfd,exp){
  const pct=slfPct(mfd,exp),col=slfColor(d);
  const label=d===null?"—":d<0?"EXPIRED":d+" days left";
  const cls=d===null?"":d<0?"exp":d<=14?"crit":d<=CFG.warnDays?"warn":"good";
  return`<div class="slf-bar"><div class="slf-track"><div class="slf-fill" style="width:${pct}%;background:${col}"></div></div><span class="slf-txt ${cls}">${label}</span></div>`;
}

function sbadge(s){
  const m={received:"g",fulfilled:"g","on time":"g",delivered:"g",delayed:"r","on process":"a","in process":"a",pending:"a",cancelled:"r",dispatched:"t","in transit":"b"};
  const labels={"on process":"In Process"};
  return bx(m[(s||"").toLowerCase()]||"x",labels[s]||s||"—");
}
function fbadge(f){return bx(f==="Delayed"?"r":f==="On Time"?"g":"x",f||"—");}

const lowItems=()=>S.inv.filter(function(r){
  var thresh=r.minQty>0?r.minQty:(r.unit==="kg"||r.unit==="litre"||r.unit==="gm"?CFG.lowThreshWt:CFG.lowThreshPcs)||CFG.lowThresh;
  return r.qty<=thresh;
});
const lowPktItems=()=>S.pkt.filter(r=>r.qty<=CFG.pktLowThresh);
const expSoon=()=>{const s=new Date();s.setDate(s.getDate()+CFG.warnDays);return S.inv.filter(r=>{if(!r.exp)return false;const d=new Date(r.exp);return d<=s;});};

// Log stock movement
function logMove(type,product,qty,unit,ref,note){
  S.movements.unshift({id:uid(),type,product,qty,unit,ref,note,date:today(),ts:Date.now()});
  if(S.movements.length>1000)S.movements=S.movements.slice(0,1000);
  // Also log to activity history
  logHistory("stock_"+type, product, qty+" "+unit+(ref?" ("+ref+")":"")+(note?" — "+note:""));
}

// Log any data change to activity history
function logHistory(action, target, detail){
  if(!action)return;
  target=String(target||"").slice(0,200);
  detail=String(detail||"").slice(0,500);
  var now=new Date();
  var entry={
    id:uid(),
    action:action,
    target:target||"",
    detail:detail||"",
    user:window._userName||"Unknown",
    email:window._userEmail||"",
    uid:window._uid||"",
    ts:now.getTime(),
    date:now.toISOString().split("T")[0],
    time:now.toTimeString().slice(0,8),
    datetime:now.toISOString()
  };
  if(!S.history)S.history=[];
  S.history.unshift(entry);
  if(S.history.length>1000)S.history=S.history.slice(0,1000); // keep only latest 1000
}

function render(){

    try{
      buildNav();
      document.getElementById("pg-title").textContent=(TABS[TAB]||{title:TAB}).title;
      document.getElementById("pg-sub").textContent=(TABS[TAB]||{sub:""}).sub;
      var paneHtml="";
      try{paneHtml=buildPane();}catch(paneErr){
        paneHtml='<div class="abar red" style="margin:20px">⚠ Error rendering page: '+paneErr.message+'<br><small style="opacity:.7">'+paneErr.stack.split("\\n")[0]+'</small><br><br><button class="btn pr" onclick="TAB=\'dashboard\';render()">↩ Go to Dashboard</button></div>';
      }

    ]},

      {id:"procurement",icon:"🛒",label:"Procurement"},
      {id:"orders",icon:"📋",label:"Orders",badge:pend},

      {id:"customers",icon:"👥",label:"Customers"},
      {id:"dispatchers",icon:"🚛",label:"Dispatchers"},
    ]},
    {sec:"Intelligence",id:"grp-intel",items:[
      {id:"ai",icon:"🤖",label:"AI Predict"},
      {id:"reports",icon:"📈",label:"Reports"},
    ]},
    {sec:"Tools",id:"grp-tools",items:[
      {id:"lots",icon:"🏷",label:"Lot Tracking"},
      {id:"boxcalc",icon:"📦",label:"Box Calc"},
      {id:"alerts",icon:"⚠",label:"Alerts",badge:lows+exps+pktLows},
    ]},
    {sec:"Audit",id:"grp-audit",items:[
      {id:"history",icon:"🕵",label:"Activity History"},
      {id:"team",icon:"👥",label:"Team Access"},
      {id:"backup",icon:"💾",label:"Backup & Restore"},
    ]},
  ];
  // Restore collapsed state from sessionStorage
  if(!window._navCollapsed){
    window._navCollapsed={};
    try{var s=JSON.parse(sessionStorage.getItem("finest_nav_col")||"{}");window._navCollapsed=s;}catch(e){}
  }
  var html="";
  groups.forEach(function(grp){
    var isCollapsed=window._navCollapsed[grp.id]===true;
    // Auto-expand group that contains active tab
    if(grp.items.some(function(it){return it.id===TAB;}))isCollapsed=false;
    var grpBadge=grp.items.reduce(function(a,it){return a+(it.badge||0);},0);
    var badgeHtml=grpBadge>0?'<span class="nav-badge" style="margin-right:4px">'+grpBadge+'</span>':'';
    var arrowCls=isCollapsed?' collapsed':'';
    html+='<div class="nav-sec" onclick="toggleNavGroup(\''+grp.id+'\')">';
    html+=grp.sec+badgeHtml;
    html+='<span class="nav-sec-arrow'+arrowCls+'">▼</span></div>';
    html+='<div class="nav-group" id="'+grp.id+'"'+(isCollapsed?' style="max-height:0"':' style="max-height:400px"')+'>';
    grp.items.forEach(function(n){
      var on=TAB===n.id?" on":"";
      var badge=n.badge>0?'<span class="nav-badge">'+n.badge+'</span>':"";
      html+='<button class="nav-btn'+on+'" data-tab="'+n.id+'"><span class="nav-icon">'+n.icon+'</span><span>'+n.label+'</span>'+badge+'</button>';
    });
    html+='</div>';
  });
  document.getElementById("nav-el").innerHTML=html;
}

function collapseAllNav(){
  if(!window._navCollapsed)window._navCollapsed={};
  ["grp-overview","grp-inv","grp-ops","grp-masters","grp-intel","grp-tools","grp-audit"].forEach(function(id){
    window._navCollapsed[id]=true;
    var el=document.getElementById(id);
    if(el){el.style.maxHeight="0";}
    var arrow=el&&el.previousElementSibling?el.previousElementSibling.querySelector(".nav-sec-arrow"):null;
    if(arrow)arrow.classList.add("collapsed");
  });
  try{sessionStorage.setItem("finest_nav_col",JSON.stringify(window._navCollapsed));}catch(e){}
}
function expandAllNav(){
  if(!window._navCollapsed)window._navCollapsed={};
  ["grp-overview","grp-inv","grp-ops","grp-masters","grp-intel","grp-tools","grp-audit"].forEach(function(id){
    window._navCollapsed[id]=false;
    var el=document.getElementById(id);
    if(el){el.style.maxHeight="400px";}
    var arrow=el&&el.previousElementSibling?el.previousElementSibling.querySelector(".nav-sec-arrow"):null;
    if(arrow)arrow.classList.remove("collapsed");
  });
  try{sessionStorage.setItem("finest_nav_col",JSON.stringify(window._navCollapsed));}catch(e){}
}
function toggleNavGroup(grpId){
  if(!window._navCollapsed)window._navCollapsed={};
  var el=document.getElementById(grpId);
  var arrow=el?el.previousElementSibling.querySelector('.nav-sec-arrow'):null;
  if(!el)return;
  var isNowCollapsed=!window._navCollapsed[grpId];
  window._navCollapsed[grpId]=isNowCollapsed;
  try{sessionStorage.setItem("finest_nav_col",JSON.stringify(window._navCollapsed));}catch(e){}
  if(isNowCollapsed){el.style.maxHeight="0";}
  else{el.style.maxHeight="400px";}
  if(arrow)arrow.classList.toggle("collapsed",isNowCollapsed);
}

  try{ document.getElementById('content').innerHTML = buildPane(); }catch(e){ console.error(e); }
}

function pShelfLife(){
  if(!window._slfExpanded)window._slfExpanded={};
  var q          = (FV.slf||'').toLowerCase();
  var f          = FV['slf-f']   || 'all';
  var prodFilter = FV['slf-prod'] || '';
  var sortBy     = FV['slf-sort'] || 'newest';

  // ── Filter rows
  var rows = S.inv.filter(function(r){
    if(r._slfHidden) return false;
    if(q && !r.name.toLowerCase().includes(q) && !(r.lot||'').toLowerCase().includes(q)) return false;
    if(prodFilter && r.name !== prodFilter) return false;
    return true;
  });
  if(f==='critical') rows = rows.filter(function(r){ var d=daysLeft(r.exp); return d!==null&&d<=14; });
  else if(f==='warning') rows = rows.filter(function(r){ var d=daysLeft(r.exp); return d!==null&&d>14&&d<=CFG.warnDays; });
  else if(f==='expired') rows = rows.filter(function(r){ var d=daysLeft(r.exp); return d!==null&&d<0; });
  else if(f==='good')    rows = rows.filter(function(r){ var d=daysLeft(r.exp); return d===null||d>CFG.warnDays; });

  // ── Sort rows
  if(sortBy==='name')    rows = rows.slice().sort(function(a,b){ return a.name.localeCompare(b.name); });
  else if(sortBy==='pct')rows = rows.slice().sort(function(a,b){ return slfPct(b.mfd,b.exp)-slfPct(a.mfd,a.exp); });
  else if(sortBy==='exp')rows = rows.slice().sort(function(a,b){
    var da=daysLeft(a.exp); var db=daysLeft(b.exp);
    return (da!==null?da:9999)-(db!==null?db:9999);
  });
  else rows = rows.slice().reverse(); // newest = reverse insertion order

  // ── Build cards
  var cardsHtml = rows.length ? rows.map(function(r){
    var invIdx   = S.inv.indexOf(r);
    var lotGroup = S.lot.find(function(l){ return l.name===r.name; });
    // allLots newest-first: reverse the stored array (oldest first → newest first)
    var allLots  = lotGroup ? lotGroup.lots.slice().reverse() : [];
    var lotDates = lotGroup ? (lotGroup.lotDates||{}) : {};
    var li2      = lotGroup ? S.lot.indexOf(lotGroup) : -1;
    var dl       = daysLeft(r.exp);
    var pct      = slfPct(r.mfd, r.exp);
    var col      = slfColor(dl);
    var isExpanded = !!window._slfExpanded[r.name];

    // Previous lot = first in allLots that isn't current
    var prevLot = null;
    for(var pi=0;pi<allLots.length;pi++){ if(allLots[pi]!==r.lot){ prevLot=allLots[pi]; break; } }
    var prevLd  = prevLot ? (lotDates[prevLot]||{}) : null;
    var prevDl  = (prevLd && prevLd.exp) ? daysLeft(prevLd.exp) : null;
    var prevPct = prevLd ? slfPct(prevLd.mfd, prevLd.exp) : 0;
    var prevCol = slfColor(prevDl);

    // Older lots = everything except current and previous
    var olderLots = allLots.filter(function(lt){ return lt!==r.lot && lt!==prevLot; });
    var olderCount = olderLots.length;

    // ── Build older lots HTML (only when expanded)
    var olderHtml = '';
    if(isExpanded){
      olderHtml = olderLots.map(function(lt){
        var ld   = lotDates[lt] || {};
        var ldl  = ld.exp ? daysLeft(ld.exp) : null;
        var lpct = slfPct(ld.mfd, ld.exp);
        var lcol = slfColor(ldl);
        return slfLotRow(lt, ld, ldl, lcol, lpct, li2, false);
      }).join('');
    }

    // ── Drop-down toggle button label
    var dropBtnLabel = isExpanded
      ? '\u25b2 Minimise older lots'
      : '\u25bc ' + olderCount + ' older lot' + (olderCount!==1?'s':'');

    // safe name for onclick attribute
    var safeName = r.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

    // ── Current lot bar
    var mfdDisp = r.mfd ? fd(r.mfd) : '\u2014';
    var expDisp = r.exp ? fd(r.exp) : '\u2014';
    var daysDisp= dl===null ? '\u2014' : dl<0 ? 'EXPIRED' : dl+' days left';

    var html = '';
    html += '<div class="card" style="border-left:3px solid '+col+'">';

    // Header row
    var clqd=lotDates[r.lot]||{};
    // Total stock across ALL inventory entries for this product name
    var totalStock=S.inv.filter(function(p){return p.name===r.name;}).reduce(function(a,p){return a+p.qty;},0);
    var multiEntry=S.inv.filter(function(p){return p.name===r.name;}).length>1;
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
    html +=   '<div style="flex:1;min-width:0">';
    html +=     '<div style="font-weight:600;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.name+'</div>';
    // Total stock pill — prominent below name
    html +=     '<div style="margin-top:4px;display:inline-flex;align-items:center;gap:8px;background:var(--S2);border-radius:var(--R);padding:3px 9px">';
    html +=       '<span style="font-size:10.5px;color:var(--hx)">Total stock:</span>';
    html +=       '<span style="font-size:12.5px;font-weight:700;color:var(--at);font-family:monospace">'+N(totalStock)+' '+r.unit+'</span>';
    if(multiEntry) html += '<span style="font-size:10px;color:var(--hx)">('+S.inv.filter(function(p){return p.name===r.name;}).length+' entries)</span>';
    html +=     '</div>';
    // Current lot stock line
    html +=     '<div style="font-size:11px;margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
    html +=       '<span style="font-family:monospace;color:var(--at)">'+r.lot+'</span>';
    html +=       '<span style="color:var(--hx);font-size:10px">\u2713 Current lot</span>';
    html +=       '<span style="color:var(--hx)">\xb7 <strong>'+N(r.qty)+'</strong> '+r.unit+' in stock</span>';
    if(clqd.receivedQty) html += '<span style="color:var(--b2);font-size:10px">\xb7 received: '+N(clqd.receivedQty)+' '+(clqd.receivedUnit||r.unit)+'</span>';
    if(allLots.length>1) html += '<span style="color:var(--hx);font-size:10px">\xb7 '+allLots.length+' lots</span>';
    html +=     '</div>';
    html +=   '</div>';
    html +=   '<div style="display:flex;align-items:center;gap:4px;flex-shrink:0;margin-left:8px">';
    html +=     slfBadge(dl);
    html +=     '<button class="btn xs" onclick="editProductShelfLife('+invIdx+')" title="Edit dates">\u270f</button>';
    html +=     '<button class="btn xs dn" onclick="clearProductShelfLife('+invIdx+')" title="Clear dates">\u2715</button>';
    html +=   '</div>';
    html += '</div>';

    // Current lot stats grid
    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;text-align:center">';
    html +=   '<div><div style="font-size:10px;color:var(--hx);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px">MFD</div>'
             +'<div style="font-size:12.5px;font-weight:500">'+mfdDisp+'</div></div>';
    html +=   '<div><div style="font-size:10px;color:var(--hx);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px">Used</div>'
             +'<div style="font-size:12.5px;font-weight:600;color:'+col+'">'+pct+'%</div></div>';
    html +=   '<div><div style="font-size:10px;color:var(--hx);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px">Expires</div>'
             +'<div style="font-size:12.5px;font-weight:500;color:'+col+'">'+expDisp+'</div></div>';
    html += '</div>';

    // Shelf life progress bar
    html += '<div class="pbar" style="height:8px;margin-bottom:5px">'
           +'<div class="pfill" style="width:'+pct+'%;background:'+col+'"></div></div>';
    html += '<div style="display:flex;justify-content:space-between;font-size:10.5px;color:var(--hx);margin-bottom:12px">'
           +'<span>'+(r.mfd?fd(r.mfd):'MFD?')+'</span>'
           +'<span style="color:'+col+';font-weight:600">'+daysDisp+'</span>'
           +'<span>'+(r.exp?fd(r.exp):'EXP?')+'</span>'
           +'</div>';

    // Previous lot — always visible
    if(prevLot){
      html += '<div style="margin-bottom:6px">'
             + slfLotRow(prevLot, prevLd, prevDl, prevCol, prevPct, li2, true)
             +'</div>';
    }

    // Older lots dropdown toggle
    if(olderCount > 0){
      html += '<button onclick="toggleSlfExpand(\''+safeName+'\')" '
             +'style="width:100%;padding:6px 10px;background:var(--S2);border:1px solid var(--bd);'
             +'border-radius:var(--R);color:var(--hx);font-size:11.5px;cursor:pointer;'
             +'text-align:center;font-family:inherit;transition:background .12s" '
             +'onmouseover="this.style.background=\'var(--S3)\'" '
             +'onmouseout="this.style.background=\'var(--S2)\'">'
             +dropBtnLabel+'</button>';
      if(isExpanded){
        html += '<div style="margin-top:6px;display:flex;flex-direction:column;gap:5px">'+olderHtml+'</div>';
      }
    }

    html += '</div>'; // close card
    return html;
  }).join('') : '<div style="color:var(--hx);padding:40px;text-align:center;grid-column:1/-1">No products match this filter.</div>';

  // ── Products without shelf life dates
  var withoutDates = (f==='all')
    ? S.inv.filter(function(r){ return !r._slfHidden&&!r.mfd&&!r.exp&&(prodFilter?r.name===prodFilter:true); })
    : [];
  var withoutHtml = '';
  if(withoutDates.length){
    withoutHtml = '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)">'
      +'<div style="font-size:11px;color:var(--hx);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">'
      +'No shelf life dates ('+withoutDates.length+')</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px">'
      +withoutDates.map(function(w){
        return '<div class="card" style="border-left:3px solid var(--bd2);display:flex;'
          +'align-items:center;justify-content:space-between;padding:10px 14px">'
          +'<div><div style="font-size:13px;font-weight:500">'+w.name+'</div>'
          +'<div style="font-size:11px;color:var(--hx);font-family:monospace">'+w.lot+' \xb7 '+N(w.qty)+' '+w.unit+'</div></div>'
          +'<button class="btn xs pr" onclick="editProductShelfLife('+S.inv.indexOf(w)+')">+ Add Dates</button>'
          +'</div>';
      }).join('')
      +'</div></div>';
  }

  // ── Product dropdown options
  var prodNames = [];
  S.inv.forEach(function(r){ if(!prodNames.includes(r.name)) prodNames.push(r.name); });
  prodNames.sort();
  var prodOpts = prodNames.map(function(n){
    return '<option value="'+n+'" '+(prodFilter===n?'selected':'')+'>'+n+'</option>';
  }).join('');

  return ''
    +'<div style="background:var(--S);border:1px solid var(--bd);border-radius:var(--RL);padding:13px 16px;'
    +'margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">'
    +'<div><div style="font-size:13px;font-weight:500">\u23f1 Expiry Warning Threshold</div>'
    +'<div style="font-size:11px;color:var(--hx)">Warn when shelf life drops below N days</div></div>'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<input class="fi" id="warn-days-inp" type="number" value="'+CFG.warnDays+'" style="width:80px">'
    +'<button class="btn sm pr" data-action="set-warn-days">Update</button>'
    +'</div></div>'
    +'<div class="frow">'
    +'<input class="si" placeholder="\ud83d\udd0d Search product or lot\u2026" value="'+(FV.slf||'')+'" data-filter="slf">'
    +'<select class="si" data-filter="slf-f" style="width:145px">'
    +'<option value="all" '+(f==='all'?'selected':'')+'>All products</option>'
    +'<option value="critical" '+(f==='critical'?'selected':'')+'>🔴 Critical (\u226414d)</option>'
    +'<option value="warning" '+(f==='warning'?'selected':'')+'>🟡 Warning</option>'
    +'<option value="expired" '+(f==='expired'?'selected':'')+'>💀 Expired</option>'
    +'<option value="good" '+(f==='good'?'selected':'')+'>🟢 Good</option>'
    +'</select>'
    +'<select class="si" data-filter="slf-prod" style="width:175px">'
    +'<option value="">All products</option>'+prodOpts
    +'</select>'
    +'<select class="si" data-filter="slf-sort" style="width:145px">'
    +'<option value="newest" '+(sortBy==='newest'?'selected':'')+'>\u23ec Newest First</option>'
    +'<option value="exp" '+(sortBy==='exp'?'selected':'')+'>📅 Expiry \u2191</option>'
    +'<option value="name" '+(sortBy==='name'?'selected':'')+'>🔤 Name A\u2013Z</option>'
    +'<option value="pct" '+(sortBy==='pct'?'selected':'')+'>📊 Used % \u2193</option>'
    +'</select>'
    +'<button onclick="window._slfExpanded={};try{document.getElementById(\'content\').innerHTML=buildPane();}catch(e){}" '
    +'class="btn sm" title="Collapse all expanded sections" style="color:var(--hx)">\u25b2 Reset All</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px">'
    +cardsHtml
    +'</div>'
    +withoutHtml;
}

function importDispatchers(){
  var input=document.createElement("input");
  input.type="file";input.accept=".csv";
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var lines=ev.target.result.split("\n").filter(function(l){return l.trim();});
        if(lines.length<2){toast("CSV must have header + at least 1 row","warn");return;}
        // Expected headers (case-insensitive): Name, Type, Contact Person, Phone, Alt Phone, Dispatch From, Delivers To, Notes
        var headers=lines[0].split(",").map(function(h){return h.replace(/"/g,"").trim().toLowerCase();});
        var colMap={};
        var fieldMap={
          "name":"name","type":"type",
          "contact person":"contact","contact":"contact",
          "phone":"phone","primary phone":"phone",
          "alt phone":"altPhone","alternate phone":"altPhone","alt. phone":"altPhone",
          "dispatch from":"fromPlace","from":"fromPlace","from place":"fromPlace","dispatched from":"fromPlace",
          "delivers to":"toPlace","to":"toPlace","to place":"toPlace","delivery to":"toPlace",
          "notes":"notes","vehicle details":"notes"
        };
        headers.forEach(function(h,i){
          var key=fieldMap[h]||h;
          colMap[key]=i;
        });
        var rows=lines.slice(1).map(function(line){
          var vals=[];var cur="";var inQ=false;
          for(var ci=0;ci<line.length;ci++){
            if(line[ci]==='"'){inQ=!inQ;}
            else if(line[ci]===","&&!inQ){vals.push(cur);cur="";}
            else cur+=line[ci];
          }
          vals.push(cur);
          function get(field){return colMap[field]!=null?(vals[colMap[field]]||"").replace(/"/g,"").trim():"";}
          return{
            id:"D"+uid(),
            name:get("name"),type:get("type"),
            contact:get("contact"),phone:get("phone"),
            altPhone:get("altPhone"),
            fromPlace:get("fromPlace"),toPlace:get("toPlace"),
            notes:get("notes")
          };
        }).filter(function(r){return r.name;});
        if(!rows.length){toast("No valid rows found — check CSV has a Name column","warn");return;}
        if(!S.dispatchers)S.dispatchers=[];
        var added=0,updated=0;
        rows.forEach(function(d){
          var existing=S.dispatchers.findIndex(function(x){return x.name.toLowerCase()===d.name.toLowerCase();});
          if(existing>=0){S.dispatchers[existing]=Object.assign({},S.dispatchers[existing],d);updated++;}
          else{S.dispatchers.push(d);added++;}
        });
        schedSave();render();
        toast("Imported: "+added+" added, "+updated+" updated ✓","ok");
        logHistory("import_dispatchers","CSV",""+rows.length+" dispatcher(s) imported");
      }catch(err){toast("Import error: "+err.message,"warn");}
    };
    reader.readAsText(file);
  };
  input.click();
}

async function runAI(){
  const btn=document.getElementById("ai-btn"),res=document.getElementById("ai-result"),tbl=document.getElementById("ai-table");
  if(!res)return;
  btn.disabled=true;
  res.className="ai-result loading";
  res.innerHTML=`<div class="dot-anim">Analyzing your warehouse data<span></span><span></span><span></span></div>`;
  tbl.innerHTML="";
  const pf=gv("ai-prod"),days=gv("ai-days")||60;
  const ph=S.proc.filter(r=>r.status==="RECEIVED"&&r.vendor&&r.vendor!=="—");
  const filtered=pf==="all"?ph:ph.filter(r=>r.vendor===pf);
  const inv=S.inv.map(r=>{const dl=daysLeft(r.exp);return`${r.name}: stock=${N(r.qty)} ${r.unit}, min=${N(r.minQty||CFG.lowThresh)}, lot=${r.lot}, mfd=${r.mfd?fd(r.mfd):"?"}, exp=${r.exp?fd(r.exp):"?"}, days_left=${dl!==null?dl:"?"}, used=${slfPct(r.mfd,r.exp)}%`;}).join("\n");
  const po=filtered.slice(-20).map(r=>`${r.vendor}: ${r.qty}, ordered ${r.poDate!=="—"?fd(r.poDate):"?"},received ${r.grn!=="—"?fd(r.grn):"pending"}, delay=${r.aging}`).join("\n");
  const lows=lowItems().map(r=>`${r.name}: ${N(r.qty)} ${r.unit} (min: ${N(r.minQty||CFG.lowThresh)})`).join("\n")||"None";
  const exps=expSoon().map(r=>`${r.name}: expires in ${daysLeft(r.exp)} days`).join("\n")||"None";
  const ordSum=S.ord.filter(o=>o.status!=="cancelled").slice(-20).map(o=>`${o.product}: ${o.qty} ${o.unit}`).join("\n")||"No orders";
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:`You are a warehouse procurement expert for Finest Foods India.

CURRENT INVENTORY:\n${inv}

PURCHASE ORDER HISTORY (last 20):\n${po}

LOW STOCK ITEMS:\n${lows}

EXPIRING SOON:\n${exps}

RECENT SALES/ORDERS:\n${ordSum}

Provide procurement recommendations for next ${days} days.
Return ONLY a JSON array, no other text:
[{"product":"Name","qty":"50 kg","priority":"High","reason":"Brief reason max 15 words","orderBy":"2026-04-20","estimatedCost":""}]
Priority: Critical/High/Medium/Low. Only include products genuinely needing procurement.`}]})});
    const data=await r.json();
    const txt=(data.content&&data.content[0]&&data.content[0].text)||"";
    const match=txt.match(/\[[\s\S]*\]/);
    if(match){
      const preds=JSON.parse(match[0]);
      res.className="ai-result";
      res.innerHTML=`<div style="color:var(--g2);font-weight:500">✅ ${preds.length} recommendation(s) for next ${days} days</div><div style="font-size:11.5px;color:var(--hx);margin-top:4px">Based on ${filtered.length} POs · ${S.inv.length} products · ${S.ord.length} orders</div>`;
      const pc={"Critical":"#ef4444","High":"#f59e0b","Medium":"#60a5fa","Low":"#4ade80"};
      tbl.innerHTML=`<div class="tw"><table><thead><tr><th>Product</th><th>Recommended Qty</th><th>Priority</th><th>Order By</th><th>Reasoning</th><th>Action</th></tr></thead><tbody>
        ${preds.map(p=>`<tr class="dr">
          <td><strong>${p.product}</strong></td>
          <td style="font-family:'DM Mono',monospace;font-weight:600;color:var(--at)">${p.qty}</td>
          <td><span class="bx" style="background:${pc[p.priority]||"#666"}22;color:${pc[p.priority]||"#aaa"}">${p.priority}</span></td>
          <td class="d">${p.orderBy?fd(p.orderBy):"ASAP"}</td>
          <td style="font-size:12px;color:var(--mx);max-width:200px">${p.reason}</td>
          <td><button class="btn xs pr" onclick="createPOFromAI('${p.product.replace(/'/g,"\\'")}','${p.qty}')">+ PO</button></td>
        </tr>`).join("")}
      </tbody></table></div>`;
    }else{res.className="ai-result";res.innerHTML=txt;}
  }catch(e){res.className="ai-result error";res.innerHTML="⚠ AI failed: "+e.message;}
  btn.disabled=false;
}

  var curStock=invProd?(N(invProd.qty)+" "+prodUnit):"";

  function uLbl(u){return u==="pcs"?"pieces (pcs)":u==="kg"?"weight (kg)":u;}

  // Shelf life preview live update
  setTimeout(function(){
    var mEl=document.getElementById("ec-mfd"),xEl=document.getElementById("ec-exp"),pEl=document.getElementById("ec-slf-preview");
    function upd(){
      if(!pEl)return;
      var m=mEl?mEl.value:"",x=xEl?xEl.value:"";
      if(!m&&!x){pEl.innerHTML="";return;}
      var dl=x?Math.round((new Date(x)-new Date())/864e5):null;
      var pct=m&&x?Math.min(100,Math.round((new Date()-new Date(m))/(new Date(x)-new Date(m))*100)):0;
      var col=dl===null?"var(--hx)":dl<0?"var(--r2)":dl<=14?"var(--r2)":dl<=30?"var(--y2)":"var(--g2)";
      pEl.innerHTML='<div style="background:var(--S2);border-radius:var(--R);padding:10px;font-size:12px;color:var(--hx)">'

        +(pct?'  ·  Used: <strong style="color:'+col+'">'+pct+'%</strong>':'')+'</div>';
    }
    if(mEl)mEl.addEventListener("change",upd);
    if(xEl)xEl.addEventListener("change",upd);
    upd();
  },50);
}
function saveEditLotCode(li,ti){
  var l=S.lot[li];if(!l)return;
  var oldCode=l.lots[ti];
  var newCode=(document.getElementById("ec-new")||{value:""}).value.trim();
  var setCur=(document.getElementById("ec-cur")||{value:"0"}).value==="1";
  var mfd=(document.getElementById("ec-mfd")||{value:""}).value;
  var exp=(document.getElementById("ec-exp")||{value:""}).value;
  var rcvQty=parseFloat((document.getElementById("ec-qty")||{value:""}).value)||0;
  var rcvUnit=(document.getElementById("ec-unit")||{value:""}).value||"kg";
  if(!newCode){toast("Enter a lot code","warn");return;}
  if(newCode!==oldCode&&l.lots.includes(newCode)){toast("Lot code already exists","warn");return;}
  _pushUndo("Edit lot code "+oldCode,["lot","inv","pattri"]);
  if(!l.lotDates)l.lotDates={};
  // Preserve any existing receivedQty/Unit if not overridden
  var existLd=l.lotDates[oldCode]||{};
  if(newCode!==oldCode)delete l.lotDates[oldCode];
  l.lotDates[newCode]={
    mfd:mfd||"",
    exp:exp||"",
    receivedQty:rcvQty>0?rcvQty:(existLd.receivedQty||0),
    receivedUnit:rcvQty>0?rcvUnit:(existLd.receivedUnit||rcvUnit),
    lastReceivedDate:rcvQty>0?window.today():(existLd.lastReceivedDate||"")
  };
  l.lots[ti]=newCode;
  if(l.current===oldCode||setCur)l.current=newCode;

  // ── Interlink: sync to inventory product if current lot
  var invProd=S.inv.find(function(p){return p.name===l.name;});
  if(invProd&&(l.current===newCode||setCur)){
    if(mfd)invProd.mfd=mfd;
    if(exp)invProd.exp=exp;
    invProd.lot=newCode;
  }
  // ── Interlink: if lot code changed, update lot references in orders
  if(newCode!==oldCode){
    S.ord.forEach(function(o){
      if(o.lot===oldCode&&o.product===l.name)o.lot=newCode;
      if(o.items)o.items.forEach(function(it){if(it.lot===oldCode&&it.product===l.name)it.lot=newCode;});
    });
  }

  var detail="lot "+oldCode+(newCode!==oldCode?"→"+newCode:"")
    +(mfd?", mfd="+mfd:"")+(exp?", exp="+exp:"")
    +(rcvQty?", qty="+N(rcvQty)+" "+rcvUnit:"")
    +(setCur?" (set as current)":"");
  logHistory("edit_lot",l.name,detail);
  closeM();schedSave();render();
  toast("Lot updated"+(rcvQty?" · qty "+N(rcvQty)+" "+rcvUnit+" saved":"")+" ✓","ok");
}


function removeLotCode(li,ti){
  var l=S.lot[li];if(!l)return;
  var code=l.lots[ti];
  if(!confirm("Remove lot "+code+" from "+l.name+"?"))return;
  _pushUndo("Remove lot "+code,["lot","inv"]);
  l.lots.splice(ti,1);
  if(l.current===code)l.current=l.lots[l.lots.length-1]||"";
  logHistory("remove_lot",l.name,"removed lot="+code);
  schedSave();render();toast("Lot "+code+" removed ✓","info");
}

function setCurrentLot(li,code){
  var l=S.lot[li];if(!l)return;
  _pushUndo("Set current lot",["lot","inv"]);
  l.current=code;
  // Interlink: sync current lot's dates to inventory product
  var invProd=S.inv.find(function(p){return p.name===l.name;});
  if(invProd){
    invProd.lot=code;
    var ld=(l.lotDates&&l.lotDates[code])||{};
    if(ld.mfd)invProd.mfd=ld.mfd;
    if(ld.exp)invProd.exp=ld.exp;
  }
  logHistory("set_current_lot",l.name,"current lot → "+code+(invProd?" (dates synced to inventory)":""));
  schedSave();render();toast(code+" set as current lot ✓","ok");
}

    html+='<tr class="empty"><td colspan="5">No in-process POs</td></tr>';
  }
  html+='</tbody></table></div>';
  return html;
}

      if(ld.receivedQty) info+=' ('+N(ld.receivedQty)+' '+ld.receivedUnit+')';
      if(ld.exp){var dl=daysLeft(ld.exp);if(dl!==null)info+=dl<0?' EXPIRED':' '+dl+'d';}
      return '<option value="'+lt+'" '+(lt===lg.current?'selected':'')+'>'+lt+info+'</option>';
    }).join('');
    sel.innerHTML=opts+'<option value="">+ New lot code</option>';
    if(lg.current&&inp)inp.value=lg.current;
    // Auto-fill unit and stock from inventory
    if(inv&&unitSel)unitSel.value=inv.unit;
    if(inv&&qtyInp&&!qtyInp.value)qtyInp.value=inv.qty;
  } else {
    sel.innerHTML='<option value="">— type new lot below —</option>';
    if(inp)inp.value='';
  }
}

// When lot selected from dropdown — fill the text input
function onInvLotChange(){
  var sel=document.getElementById('m-lot-sel');
  var inp=document.getElementById('m-lot');
  var mfdInp=document.getElementById('m-mfd');
  var expInp=document.getElementById('m-exp');
  if(!sel||!inp)return;
  var lotCode=sel.value;
  if(!lotCode){inp.value='';return;}
  inp.value=lotCode;
  // Auto-fill MFD/Expiry from lot tracking
  var name=(document.getElementById('m-name')||{value:''}).value.trim();
  var lg=S.lot.find(function(l){return l.name===name;});
  if(lg&&lg.lotDates&&lg.lotDates[lotCode]){
    var ld=lg.lotDates[lotCode];
    if(ld.mfd&&mfdInp)mfdInp.value=ld.mfd;
    if(ld.exp&&expInp)expInp.value=ld.exp;
    updateSlfPreview();
  }
}

function updateSlfPreview(){
  const mfd=gv("m-mfd"),exp=gv("m-exp"),el=document.getElementById("m-slf-prev");
  if(!el||!exp)return;
  const dl=daysLeft(exp),col=slfColor(dl),pct=slfPct(mfd,exp);
  el.innerHTML=`<div style="background:var(--S2);border:1px solid var(--bd);border-radius:var(--R);padding:10px 13px;"><div class="pbar" style="height:8px;margin-bottom:6px"><div class="pfill" style="width:${pct}%;background:${col}"></div></div><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--hx)"><span>${mfd?fd(mfd):"MFD?"}</span><span style="color:${col};font-weight:500">${dl===null?"—":dl<0?"EXPIRED":dl+" days left"}</span><span>${exp?fd(exp):"EXP?"}</span></div></div>`;
}

// ── NEW buildOrderItemRow: Products and Packets in separate columns with lot select
function buildOrderItemRow(i, item) {
  // item may have: srcKey (legacy), or invSrcKey + pktSrcKey (new dual mode)
  var invSrcKey = item ? (item.invSrcKey || (item.srcKey&&item.srcKey.startsWith('inv:')?item.srcKey:'')) : '';
  var pktSrcKey = item ? (item.pktSrcKey || (item.srcKey&&item.srcKey.startsWith('pkt:')?item.srcKey:'')) : '';
  var invQty    = item ? (item.invQty  || (invSrcKey?item.qty:0) || 0) : 0;
  var pktQty    = item ? (item.pktQty  || (pktSrcKey?item.qty:0) || 0) : 0;
  var price     = item ? (item.price  || 0) : 0;
  var lotSel    = item ? (item.lot    || '') : '';

  // Product options

// onOrdInvChange — refresh lot dropdown + inv qty label + stock preview
function onOrdInvChange(i){
  var invSel = document.getElementById('oi-inv-'+i);
  if(!invSel) return;
  var src = invSel.value;
  var lotSel  = document.getElementById('oi-lot-'+i);
  var prevEl  = document.getElementById('oi-prev-'+i);
  var invQtyEl= document.getElementById('oi-inv-qty-'+i);
  if(!src){
    if(lotSel) lotSel.innerHTML='<option value="">— Lot —</option>';
    return;
  }
  var prod = S.inv[+src.split(':')[1]];
  if(!prod) return;
  // Update lot dropdown
  var lg = S.lot.find(function(l){ return l.name===prod.name; });
  var lopts = '';
  if(lg){
    lopts = lg.lots.slice().reverse().map(function(lt){
      var ld=(lg.lotDates||{})[lt]||{};
      var tag=lt===lg.current?' ✓ Current':'';
      var qtag=ld.receivedQty?' ('+N(ld.receivedQty)+' '+(ld.receivedUnit||prod.unit)+')':'';
      return '<option value="'+lt+'" '+(lt===lg.current?'selected':'')+'>'+lt+tag+qtag+'</option>';
    }).join('');
  } else {
    lopts = '<option value="'+prod.lot+'" selected>'+prod.lot+' ✓</option>';
  }
  if(lotSel) lotSel.innerHTML = lopts;
  // Update qty label with unit
  if(invQtyEl){
    var label=invQtyEl.previousElementSibling;
    if(label) label.textContent='Product Qty ('+prod.unit+')';
  }
  // Stock preview
  if(prevEl){
    var avail=N(prod.qty)+' '+prod.unit;
    prevEl.innerHTML='<div style="font-size:11px;color:var(--hx)">Product available: <strong style="color:var(--at)">'+avail+'</strong></div>';
  }
  updateOrderTotal();
}

// onOrdPktChange — refresh pkt qty label + stock preview
function onOrdPktChange(i){
  var pktSel = document.getElementById('oi-pkt-'+i);
  if(!pktSel) return;
  var src = pktSel.value;
  var pktQtyEl = document.getElementById('oi-pkt-qty-'+i);
  var prevEl   = document.getElementById('oi-prev-'+i);
  if(!src){
    if(pktQtyEl){var lbl=pktQtyEl.previousElementSibling;if(lbl)lbl.textContent='Packet Qty (—)';}
    return;
  }
  var pkt = S.pkt[+src.split(':')[1]];
  if(!pkt) return;
  if(pktQtyEl){
    var lbl=pktQtyEl.previousElementSibling;
    if(lbl) lbl.textContent='Packet Qty ('+pkt.unit+')';
  }
  if(prevEl){
    var avail=N(pkt.qty)+' '+pkt.unit;
    var existing=prevEl.innerHTML;
    // Append packet info without overwriting product info
    if(existing.indexOf('pkt-avail')>=0){
      prevEl.innerHTML=existing.replace(/<span id="pkt-avail[^"]*">[^<]*<\/span>/,'<span id="pkt-avail-'+i+'">Packet available: <strong style="color:var(--b2)">'+avail+'</strong></span>');
    } else {
      prevEl.innerHTML=(existing||'')+'<span id="pkt-avail-'+i+'" style="font-size:11px;color:var(--hx);margin-left:10px">Packet available: <strong style="color:var(--b2)">'+avail+'</strong></span>';
    }
  }
  updateOrderTotal();
}

function addOrderItemRow(){
  var i=window._ordRowCount++;
  var wrap=document.getElementById("ord-items-wrap");
  if(!wrap)return;
  var div=document.createElement("div");
  div.innerHTML=buildOrderItemRow(i,null);
  wrap.appendChild(div.firstChild);
}

function removeOrderItemRow(i){
  var row=document.getElementById("ord-row-"+i);
  if(row)row.remove();
  updateOrderTotal();
}

function updateOrderItemUnit(i){
  var src=(document.getElementById("oi-src-"+i)||{value:""}).value;
  var unitEl=document.getElementById("oi-unit-"+i);
  if(!unitEl||!src)return;
  var parts=src.split(":");
  if(parts[0]==="inv"&&S.inv[+parts[1]])unitEl.value=S.inv[+parts[1]].unit;
  else if(parts[0]==="pkt"&&S.pkt[+parts[1]])unitEl.value=S.pkt[+parts[1]].unit;
  else unitEl.value="";
}

function updateOrderTotal(){
  var totalVal=0;
  for(var i=0;i<(window._ordRowCount||1);i++){
    var el=document.getElementById("ord-row-"+i);
    if(!el)continue;
    // Value = Packet Qty × Price per unit (product qty not included in value)
    var pktQty =parseFloat((document.getElementById("oi-pkt-qty-"+i)||{value:0}).value)||0;
    var price  =parseFloat((document.getElementById("oi-price-"+i)||{value:0}).value)||0;
    var rowVal = pktQty * price;
    totalVal  += rowVal;
    var valEl = document.getElementById("oi-val-"+i);
    if(valEl) valEl.value = pktQty>0&&price>0 ? "₹"+N(rowVal) : (pktQty===0&&price>0?"₹0":"");
  }
  var el=document.getElementById("ord-total-row");
  if(el&&totalVal>0){
    el.innerHTML='<div class="pbox" style="margin-top:6px"><span style="color:var(--hx)">Order Total (Packets)</span><span style="font-family:DM Mono,monospace;font-weight:600;color:var(--g2)">₹'+N(totalVal)+'</span></div>';
  } else if(el){el.innerHTML="";}
}

    +'<div><div class="inv-logo">OPERIX</div><div style="font-size:11px;color:#888;margin-top:2px">Warehouse Management System</div></div>'
    +'<div style="text-align:right;font-size:12px;color:#555">'
    +'<div><strong>Invoice #'+o.id+'</strong></div>'
    +'<div>Date: '+fd(o.date)+'</div>'
    +'<div>Status: '+o.status.toUpperCase()+'</div>'
    +(o.dispatchDate?'<div>Dispatch: '+fd(o.dispatchDate)+'</div>':"")
    +'</div></div>'
    // Bill To
    +'<div style="margin-bottom:14px;font-size:13px">'
    +'<strong>Bill To:</strong> '+o.customer
    +(cust.address?'<br><span style="font-size:11.5px;color:#666">'+cust.address+'</span>':"")
    +(cust.gstin?'<br><span style="font-size:11.5px;color:#666">GSTIN: '+cust.gstin+'</span>':"")
    +(cust.phone?'<br><span style="font-size:11.5px;color:#666">📞 '+cust.phone+'</span>':"")

    +(totalAmt?'<div style="text-align:right;margin-top:10px;padding-top:8px;border-top:2px solid #333;font-size:14px"><strong>Total: '+CFG.currency+N(totalAmt)+'</strong></div>':"")

    +(o.fromLoc||o.toLoc?'Dispatch: '+(o.fromLoc||"—")+' → '+(o.toLoc||"—")+'<br>':"")

    +'</div>'

// ─── ORDER HELPERS ────────────────────────────
function buildLotOpts(pName,sel){
  if(!pName)return`<option>Select product first</option>`;
  const ld=S.lot.find(l=>l.name===pName);
  if(!ld)return`<option value="${sel||""}">${sel||"—"}</option>`;
  return ld.lots.map(l=>`<option value="${l}" ${l===(sel||ld.current)?"selected":""}>${l}${l===ld.current?" ✓":""}</option>`).join("");
}
function setOT(t){
  OT=t;
  document.querySelectorAll(".ot-btn").forEach(b=>b.classList.toggle("on",b.textContent.includes(t==="product"?"Product":"Packet")));
  const op=document.getElementById("op-row"),ok=document.getElementById("ok-row");
  if(op)op.style.display=OT==="product"?"":"none";
  if(ok)ok.style.display=OT==="packet"?"":"none";
  updUnit();updLotSel();updPrev();
}
function updUnit(){
  const u=document.getElementById("m-unit");if(!u)return;
  if(OT==="product"){const pi=(document.getElementById("m-prod")||{value:""}).value;if(pi!=null&&pi!=="")u.value=(S.inv[+pi]||{unit:""}).unit;}
  else{const pi=(document.getElementById("m-pkt")||{value:""}).value;if(pi!=null&&pi!=="")u.value=(S.pkt[+pi]||{unit:""}).unit;}
}
function updLotSel(){
  const ls=document.getElementById("m-lot-sel");if(!ls)return;
  const pi=(document.getElementById("m-prod")||{value:""}).value;
  if(!pi&&pi!=="0"){ls.innerHTML="<option>Select product first</option>";return;}
  const r=S.inv[+pi],ld=S.lot.find(l=>l.name===r.name);
  ls.innerHTML=ld?ld.lots.map(l=>`<option value="${l}" ${l===ld.current?"selected":""}>${l}${l===ld.current?" ✓":""}</option>`).join(""):`<option value="${r.lot}">${r.lot}</option>`;
}
function updPrev(){
  const pv=document.getElementById("m-prev");if(!pv)return;
  const qty=parseFloat(gv("m-qty"))||0,price=parseFloat(gv("m-price"))||0;
  if(!qty){pv.innerHTML="";return;}
  let av=0,unit="";
  if(OT==="product"){const pi=(document.getElementById("m-prod")||{value:""}).value;if(pi==null||pi==="")return;const r=S.inv[+pi];if(!r)return;av=r.qty;unit=r.unit;}
  else{const pi=(document.getElementById("m-pkt")||{value:""}).value;if(pi==null||pi==="")return;const r=S.pkt[+pi];if(!r)return;av=r.qty;unit=r.unit;}
  const af=av-qty,val=qty*price;
  pv.innerHTML=`<div class="pbox"><span><span style="color:var(--hx)">Available: </span><span class="pv">${N(av)} ${unit}</span></span><span style="color:var(--hx)">→</span><span><span style="color:var(--hx)">After: </span><span class="${af<0?"pw":"pa"}">${N(Math.max(0,af))} ${unit}</span></span>${val>0?`<span style="color:var(--g2);font-family:'DM Mono',monospace">${CFG.currency}${N(val)}</span>`:""}${af<0?`<div style="color:var(--r2);font-size:12px;width:100%;margin-top:4px">⚠ Quantity exceeds available stock!</div>`:""}</div>`;
}

// ══════════════════════════════════════════════
//  EVENTS — using delegation for performance
// ══════════════════════════════════════════════
function attachEvents(){
  // Use single delegated listener on content — no re-attach lag
  const c=document.getElementById("content");
  c.onclick=handleClick;
  c.oninput=handleInput;
  c.onchange=handleChange;
  // Modal events
  MW.onclick=handleClick;
  // Nav events (re-attach after render)
  document.getElementById("nav-el").onclick=e=>{
    const n=e.target.closest("[data-tab]");
    if(n){TAB=n.dataset.tab;closeSidebar();render();}
  };
  // Topbar buttons
  document.querySelector(".tb-right").onclick=handleClick;
  _updateUndoBtn();
}

function handleClick(e){
  const el=e.target.closest("[data-action],[data-tab]");if(!el)return;
  const a=el.dataset.action,t=el.dataset.tab;
  if(t){TAB=t;closeM();closeSidebar();render();return;}
  switch(a){
    case"do-undo":_doUndo();break;
    case"do-redo":_doRedo();break;
    case"ord-page-prev":{FV["ord_page"]=Math.max(0,(parseInt(FV["ord_page"]||0)-1));try{document.getElementById("content").innerHTML=buildPane();}catch(ex){}}break;
    case"ord-page-next":{FV["ord_page"]=(parseInt(FV["ord_page"]||0)+1);try{document.getElementById("content").innerHTML=buildPane();}catch(ex){}}break;
    case"inv-page-prev":{FV["inv_page"]=Math.max(0,(parseInt(FV["inv_page"]||0)-1));try{document.getElementById("content").innerHTML=buildPane();}catch(ex){}}break;
    case"inv-page-next":{FV["inv_page"]=(parseInt(FV["inv_page"]||0)+1);try{document.getElementById("content").innerHTML=buildPane();}catch(ex){}}break;
    case"close-m":closeM();break;
    case"open-inv":openInvModal(null);break;
    case"edit-inv":openInvModal(+el.dataset.i);break;
    case"adjust-inv":openAdjModal(+el.dataset.i);break;
    case"del-inv":if(confirm("Delete this stock entry?")){
      _pushUndo("Delete product",["inv","pattri","lot"]);
      const r=S.inv.splice(+el.dataset.i,1)[0];
      logMove("adj",r.name,r.qty,r.unit,"Delete","Deleted from inventory");
      logHistory("delete_product",r.name,"lot="+r.lot+", qty="+N(r.qty)+" "+r.unit);
      // Interlink: also remove from pattri if exists
      const pti=S.pattri.findIndex(function(p){return p.name===r.name;});
      if(pti>=0){logHistory("auto_del_pattri",r.name,"Removed from pattri (product deleted)");S.pattri.splice(pti,1);}
      schedSave();render();toast("Deleted — press ↩ Undo to restore","info");
    }break;
    case"save-inv":saveInv(el.dataset.i===""?null:+el.dataset.i);break;
    case"do-adjust":doAdjust(+el.dataset.i);break;
    case"open-pkt":openPktModal(null);break;
    case"edit-pkt":openPktModal(+el.dataset.i);break;
    case"del-pkt":if(confirm("Delete this packet?")){_pushUndo("Delete packet",["pkt"]);S.pkt.splice(+el.dataset.i,1);schedSave();render();toast("Deleted — press ↩ Undo to restore","info");}break;
    case"save-pkt":savePkt(el.dataset.i===""?null:+el.dataset.i);break;
    case"open-proc":openProcModal(null);break;
    case"edit-proc":openProcModal(+el.dataset.i);break;
    case"del-proc":if(confirm("Delete this PO?")){_pushUndo("Delete PO",["proc"]);S.proc.splice(+el.dataset.i,1);schedSave();render();toast("Deleted — press ↩ Undo to restore","info");}break;
    case"save-proc":saveProc(el.dataset.i===""?null:+el.dataset.i);break;
    case"view-proc":openProcDetailModal(+el.dataset.i);break;
    case"recv-proc":openRecvModal(+el.dataset.i);break;
    case"do-recv":doRecv(+el.dataset.i);break;
    case"open-order":OT="product";openOrderModal(null);break;
    case"open-bulk-order":openBulkOrderModal();break;
    case"open-pdf-import":openPDFImportModal();break;
    case"full-backup":createBackup();break;
    case"restore-backup":restoreBackup(+el.dataset.i);break;
    case"del-backup":_pushUndo("Delete backup",["backups"]);deleteBackup(+el.dataset.i);break;
    case"download-backup":downloadBackup(+el.dataset.i);break;
    case"save-bulk-order":saveBulkOrder();break;
    case"edit-ord":OT=(S.ord[+el.dataset.i]||{}).orderType||"product";openOrderModal(+el.dataset.i);break;
    case"cancel-ord":_pushUndo("Cancel order",["ord","inv","pkt","boxes","pattri"]);cancelOrder(+el.dataset.i);break;
    case"fulfill-ord":{var fo=S.ord[+el.dataset.i];fo.status="fulfilled";logHistory("fulfill_order",fo.customer,"Order="+fo.id+" fulfilled");schedSave();render();toast("Order fulfilled ✓","ok");}break;
    case"dispatch-ord":{var dfo=S.ord[+el.dataset.i];dfo.delivery="dispatched";logHistory("dispatch_order",dfo.customer,"Order="+dfo.id+" dispatched");schedSave();render();toast("Marked as dispatched 🚚","ok");}break;
    case"save-ord":saveOrder(el.dataset.i===""?null:+el.dataset.i);break;
    case"view-ord":openOrderDetailModal(+el.dataset.i);break;
    case"invoice-ord":openInvoiceModal(+el.dataset.i);break;
    case"open-disp":openDispatcherModal(null);break;
    case"edit-disp":openDispatcherModal(+el.dataset.i);break;
    case"del-disp":if(confirm("Delete dispatcher?")){
      _pushUndo("Delete dispatcher",["dispatchers"]);
      (S.dispatchers||[]).splice(+el.dataset.i,1);
      schedSave();render();toast("Deleted — press ↩ Undo to restore","info");}
    break;
    case"save-disp":saveDispatcher(el.dataset.i===""?null:+el.dataset.i);break;
    case"export-disp":exportTableLabeled(S.dispatchers||[],"dispatchers",["name","type","contact","phone","altPhone","fromPlace","toPlace","notes"],{name:"Name",type:"Type",contact:"Contact Person",phone:"Phone",altPhone:"Alt Phone",fromPlace:"Dispatch From",toPlace:"Delivers To",notes:"Notes"});break;
    case"import-disp":importDispatchers();break;
    case"open-vendor":openVendorModal(null);break;
    case"edit-vendor":openVendorModal(+el.dataset.i);break;
    case"del-vendor":if(confirm("Delete vendor?")){
      _pushUndo("Delete vendor",["vendors","proc"]);
      var dv=S.vendors[+el.dataset.i];
      S.vendors.splice(+el.dataset.i,1);
      // Interlink: note vendor removal in related POs
      if(dv)S.proc.forEach(function(p){if(p.vendor===dv.name&&p.status==="on process")p.notes=(p.notes?p.notes+"; ":"")+"[Vendor deleted]";});
      schedSave();render();toast("Vendor deleted — press ↩ Undo to restore","info");
    }break;
    case"save-vendor":saveVendor(el.dataset.i===""?null:+el.dataset.i);break;
    case"open-customer":openCustomerModal(null);break;
    case"edit-customer":openCustomerModal(+el.dataset.i);break;
    case"del-customer":if(confirm("Delete customer?")){
      _pushUndo("Delete customer",["customers","ord"]);
      var dc=S.customers[+el.dataset.i];
      S.customers.splice(+el.dataset.i,1);
      // Interlink: note customer removal in pending orders
      if(dc)S.ord.forEach(function(o){if(o.customer===dc.name&&o.status==="pending")o.notes=(o.notes?o.notes+"; ":"")+"[Customer deleted]";});
      schedSave();render();toast("Customer deleted — press ↩ Undo to restore","info");
    }break;
    case"save-customer":saveCustomer(el.dataset.i===""?null:+el.dataset.i);break;
    case"cust-history":openCustHistModal(+el.dataset.i);break;
    case"open-lot":openLotModal();break;
    case"recv-lot-stock":openRecvLotStockModal(+el.dataset.li);break;

var _filterTimer=null;
function handleInput(e){
  var el=e.target;
  if(el.dataset.filter){
    // Reset page when filter changes
    if(el.dataset.filter==="inv")FV["inv_page"]=0;
    if(el.dataset.filter==="ord")FV["ord_page"]=0;
    FV[el.dataset.filter]=el.value;
    // Debounce: wait 180ms after last keystroke before re-rendering
    if(_filterTimer)clearTimeout(_filterTimer);
    _filterTimer=setTimeout(function(){
      try{document.getElementById("content").innerHTML=buildPane();}catch(ex){console.error(ex);}
    },180);
  }
}
function handleChange(e){
  var el=e.target;
  if(el.dataset.filter){
    FV[el.dataset.filter]=el.value;
    try{document.getElementById("content").innerHTML=buildPane();}catch(ex){console.error(ex);}
  }
}

function saveInv(idx){
  // Capture old name BEFORE any changes (critical for rename interlink)
  var oldInvName = (idx!=null && S.inv[idx]) ? S.inv[idx].name : "";
  var oldLot     = (idx!=null && S.inv[idx]) ? S.inv[idx].lot  : "";
  if(idx!=null) _pushUndo("Edit product",["inv","lot","pattri","ord","movements"]);
  var adj = parseFloat(gv("m-adj"))||null;
  var qty = parseFloat(gv("m-qty"))||0;
  var prevQty = idx!=null ? (S.inv[idx]?S.inv[idx].qty:0) : 0;
  if(adj!==null && idx!=null) qty = Math.max(0, prevQty+adj);
  // Lot code: prefer text input (allows typing new lot); fall back to dropdown
  var lotCode = (gv("m-lot")||"").trim() || (gv("m-lot-sel")||"");
  var r = {
    id: idx!=null ? S.inv[idx].id : ("P"+uid()),
    name: gv("m-name").trim(), lot: lotCode,
    cat: gv("m-cat"), qty: qty,
    minQty: parseFloat(gv("m-min"))||CFG.lowThresh,
    unit: gv("m-unit"), mfd: gv("m-mfd"), exp: gv("m-exp"), cost:0
  };
  if(!r.name||!r.lot){toast("Product name and lot required","warn");return;}

  // ── Apply to inventory
  if(idx==null){
    S.inv.push(r);
    logMove("in",r.name,r.qty,r.unit,"New Stock Entry","Added to inventory");
  } else {
    var diff=r.qty-prevQty;
    if(diff!==0) logMove(diff>0?"in":"adj",r.name,Math.abs(diff),r.unit,"Stock Edit","Manual update");
    S.inv[idx]=r;
  }

  logHistory(idx==null?"add_product":"edit_product", r.name,
    "qty="+N(r.qty)+" "+r.unit+", lot="+r.lot+(r.exp?", exp="+fd(r.exp):"")
    +(oldInvName&&oldInvName!==r.name?" (renamed from "+oldInvName+")":""));

  // ── INTERLINK A: Rename cascades to lot, pattri, orders, movements
  if(idx!=null && oldInvName && oldInvName!==r.name){
    var lgRen=S.lot.find(function(l){return l.name===oldInvName;});
    if(lgRen) lgRen.name=r.name;
    var ptRen=S.pattri.find(function(p){return p.name===oldInvName;});
    if(ptRen) ptRen.name=r.name;
    S.ord.forEach(function(o){
      if(o.product===oldInvName) o.product=r.name;
      if(o.items) o.items.forEach(function(it){if(it.product===oldInvName) it.product=r.name;});
    });
    S.movements.forEach(function(m){if(m.product===oldInvName) m.product=r.name;});
    S.proc.forEach(function(p){if(p.vendor===oldInvName) p.vendor=r.name;});
    toast("Renamed '"+oldInvName+"' → '"+r.name+"' across all sections ✓","info");
  }

  // ── INTERLINK B: Lot change cascades — if lot code changed, update lot tracking
  if(idx!=null && oldLot && oldLot!==r.lot){
    var lgLC=S.lot.find(function(l){return l.name===r.name;});
    if(lgLC){
      // Add new lot if not present, set as current
      if(!lgLC.lots.includes(r.lot)){
        lgLC.lots.push(r.lot);
        if(!lgLC.lotDates) lgLC.lotDates={};
        lgLC.lotDates[r.lot]={mfd:r.mfd||"",exp:r.exp||""};
      }
      lgLC.current=r.lot;
    }
    // Update pending orders that had the old lot
    S.ord.forEach(function(o){
      if(o.lot===oldLot && o.product===r.name) o.lot=r.lot;
      if(o.items) o.items.forEach(function(it){if(it.lot===oldLot && it.product===r.name) it.lot=r.lot;});
    });
  }

  // ── INTERLINK C: New product → auto-create lot group + pattri
  if(idx==null){
    var existLG=S.lot.find(function(l){return l.name===r.name;});
    if(!existLG && r.lot){
      var lotDatesObj={};
      lotDatesObj[r.lot]={mfd:r.mfd||"",exp:r.exp||"",receivedQty:r.qty,receivedUnit:r.unit};
      S.lot.push({name:r.name,id:S.lot.length+1,lots:[r.lot],current:r.lot,lotDates:lotDatesObj});
    } else if(existLG && r.lot && !existLG.lots.includes(r.lot)){
      existLG.lots.push(r.lot);
      existLG.current=r.lot;
      if(!existLG.lotDates) existLG.lotDates={};
      existLG.lotDates[r.lot]={mfd:r.mfd||"",exp:r.exp||"",receivedQty:r.qty,receivedUnit:r.unit};
    } else if(existLG && r.lot && existLG.lots.includes(r.lot)){
      // Lot already tracked — just update dates if provided
      if(!existLG.lotDates) existLG.lotDates={};
      if(r.mfd||r.exp) existLG.lotDates[r.lot]={mfd:r.mfd||"",exp:r.exp||""};
    }
    // Auto-create pattri entry for kg products
    if(r.unit==="kg" && !S.pattri.find(function(p){return p.name===r.name;})){
      S.pattri.push({id:"PT"+uid(),name:r.name,netWeight:r.qty,unit:"kg",notes:"Auto-added"});
    }
  } else {
    // ── INTERLINK D: Edit product → sync lot dates in lot tracking
    var existLG2=S.lot.find(function(l){return l.name===r.name;});
    if(existLG2 && r.lot){
      if(!existLG2.lotDates) existLG2.lotDates={};
      if(r.mfd||r.exp){
        var existing=existLG2.lotDates[r.lot]||{};
        existLG2.lotDates[r.lot]={
          mfd:r.mfd||existing.mfd||"",
          exp:r.exp||existing.exp||"",
          receivedQty:existing.receivedQty||0,
          receivedUnit:existing.receivedUnit||r.unit
        };
      }
      // If this lot is now set as current
      existLG2.current=r.lot;
    }
    // ── INTERLINK E: pattri net weight sync on qty change
    if(r.unit==="kg" && prevQty!==qty){
      var ptSync=S.pattri.find(function(p){return p.name===r.name;});
      if(ptSync){
        ptSync.netWeight=Math.max(0,Math.round(((ptSync.netWeight||0)+(qty-prevQty))*1000)/1000);
      }
    }
  }

  closeM();schedSave();render();
  toast(idx==null?"Stock added ✓":"Stock updated ✓","ok");
}

function doAdjust(idx){
  _pushUndo("Adjust stock",["inv"]);
  const r=S.inv[idx],t=gv("adj-type"),q=parseFloat(gv("adj-qty"))||0,note=gv("adj-note");
  if(!q){toast("Enter a quantity","warn");return;}
  let newQty=r.qty,movType="adj";
  if(t==="add"){newQty=r.qty+q;movType="in";}
  else if(t==="remove"){newQty=Math.max(0,r.qty-q);movType="out";}
  else{newQty=q;movType="adj";}
  logMove(movType,r.name,q,r.unit,"Manual Adjustment",note||t);
  logHistory("adjust_product",r.name,t+": "+N(q)+" "+r.unit+" → total "+N(newQty)+(note?" ("+note+")":""));
  var prevInvQty=S.inv[idx].qty;
  S.inv[idx].qty=newQty;
  // Interlink: update pattri net weight on manual adjust for kg/weight products
  if(r.unit==="kg"||r.unit==="litre"||r.unit==="gm"){
    var ptAdj=S.pattri.find(function(p){return p.name===r.name;});
    if(ptAdj){
      var adjDiff=newQty-prevInvQty; // use prevInvQty captured before update
      ptAdj.netWeight=Math.max(0,Math.round(((ptAdj.netWeight||0)+adjDiff)*1000)/1000);
    }
  }
  closeM();schedSave();render();toast("Stock adjusted: "+r.name+" → "+N(newQty)+" "+r.unit+" ✓","ok");
}

function doRecv(idx){
  const r=S.proc[idx],pi=gv("m-recv-prod"),addQty=parseFloat(gv("m-recv-qty"))||0,grnDate=gv("m-recv-grn");
  if(!addQty){toast("Enter quantity","warn");return;}
  if(pi==="new"){
    const nm=gv("m-new-name").trim()||r.vendor,nl=gv("m-new-lot").trim();
    if(!nl){toast("Enter lot number","warn");return;}
    const nu={id:"P"+uid(),name:nm,lot:nl,cat:"Product",qty:addQty,minQty:parseFloat(gv("m-new-min"))||CFG.lowThresh,unit:gv("m-recv-unit"),mfd:gv("m-new-mfd"),exp:gv("m-new-exp"),cost:0};
    S.inv.push(nu);
    // Also add lot to lot tracking if product exists there
    const existLot=S.lot.find(function(l){return l.name===nm;});
    if(existLot){if(!existLot.lots.includes(nl)){existLot.lots.push(nl);existLot.current=nl;}}
    else{S.lot.push({name:nm,id:S.lot.length+1,lots:[nl],current:nl});}
    logMove("in",nm,addQty,nu.unit,r.po,"PO Received — new product, new lot "+nl);
    toast("New product \""+nm+"\" created with "+N(addQty)+" units ✓","ok");
    // Interlink: auto-add to pattri if kg
    if(nu.unit==="kg"&&!S.pattri.find(function(p){return p.name===nm;})){
      S.pattri.push({id:"PT"+uid(),name:nm,netWeight:addQty,unit:"kg",notes:"Auto-added from PO receive"});
    }
  }else if(pi!==""){
    const product=S.inv[+pi];
    const prevQty=product.qty;
    product.qty=prevQty+addQty;
    // Update lot if lot field provided
    const newLot=gv("m-new-lot")||"";
    if(newLot){
      const existLot=S.lot.find(function(l){return l.name===product.name;});
      if(existLot&&!existLot.lots.includes(newLot)){existLot.lots.push(newLot);existLot.current=newLot;product.lot=newLot;}
    }
    logMove("in",product.name,addQty,product.unit,r.po,"PO Received ("+prevQty+" → "+product.qty+")");
    toast("Added "+N(addQty)+" to "+product.name+" (total: "+N(product.qty)+") ✓","ok");
    // Interlink: update pattri net weight when stock received
    if(product.unit==="kg"){
      var pattriP=S.pattri.find(function(p){return p.name===product.name;});
      if(pattriP){pattriP.netWeight=Math.round(((pattriP.netWeight||0)+addQty)*1000)/1000;}
    }
  }
  logHistory("receive_po",r.vendor,"PO="+r.po+", received="+N(addQty)+" on "+grnDate);
  r.status="RECEIVED";r.grn=grnDate||"—";
  if(r.due!=="—"&&grnDate){const d=Math.round((new Date(grnDate)-new Date(r.due))/864e5);r.aging=d+"d";r.flag=d>0?"Delayed":"On Time";}
  closeM();schedSave();render();
}

function saveOrder(idx){
  var cust=gv("m-cust").trim(),date=gv("m-date"),status=gv("m-status"),delivery=gv("m-delivery")||"—",notes=gv("m-notes").trim();
  var ordIdInput=gv("m-id").trim();
  var expiry=gv("m-expiry")||"";
  var apptDate=gv("m-appt")||"";
  var deliveryApptDate=gv("m-del-appt")||"";
  var dispatchDate=gv("m-dispatch-date")||"";
  var fromLoc=gv("m-ord-from").trim();
  var toLoc=gv("m-ord-to").trim();
  var pickupName=gv("m-pickup-name").trim();
  var pickupPhone=gv("m-pickup-ph").trim();
  var deliveryName=gv("m-del-name").trim();
  var deliveryPhone=gv("m-del-ph").trim();
  if(!cust){toast("Customer name required","warn");return;}
  if(cust.length>200){toast("Customer name too long","warn");return;}

  // ── Collect items — each row can have BOTH a product AND a packet
  var items=[],totalVal=0,errors=[];
  for(var i=0;i<(window._ordRowCount||1);i++){
    var rowEl=document.getElementById("ord-row-"+i);
    if(!rowEl)continue;
    var invVal  =(document.getElementById("oi-inv-"+i)||{value:""}).value;
    var pktVal  =(document.getElementById("oi-pkt-"+i)||{value:""}).value;
    var invQty  =parseFloat((document.getElementById("oi-inv-qty-"+i)||{value:0}).value)||0;
    var pktQty  =parseFloat((document.getElementById("oi-pkt-qty-"+i)||{value:0}).value)||0;
    var selLot  =(document.getElementById("oi-lot-"+i)||{value:""}).value;
    var price   =parseFloat((document.getElementById("oi-price-"+i)||{value:0}).value)||0;

    if(!invVal&&!pktVal) continue; // empty row
    if(invQty<=0&&pktQty<=0){
      if(invVal||pktVal) errors.push("Row "+(i+1)+": enter at least one quantity");
      continue;
    }

    // ── Product part of this row
    if(invVal&&invQty>0){
      var parts=invVal.split(":");
      var ref=S.inv[+parts[1]];
      if(!ref){errors.push("Row "+(i+1)+" product: invalid");continue;}
      // Restore original qty if editing this item
      var origInvQty=0;
      if(idx!=null&&S.ord[idx]&&S.ord[idx].items){
        S.ord[idx].items.forEach(function(oi){if(oi.invSrcKey===invVal&&oi.product===ref.name)origInvQty=oi.invQty||0;});
      }
      var avail=ref.qty+origInvQty;
      if(invQty>avail){errors.push("Row "+(i+1)+" product: only "+N(avail)+" "+ref.unit+" of "+ref.name+" available");continue;}
      items.push({
        invSrcKey:invVal, pktSrcKey:pktVal||"",
        product:ref.name, lot:selLot||ref.lot,
        pktType:pktVal?(S.pkt[+pktVal.split(':')[1]]||{}).type||"":"",
        orderType:"product+packet",
        invQty:invQty, invUnit:ref.unit,
        pktQty:pktVal&&pktQty>0?pktQty:0,
        pktUnit:pktVal?(S.pkt[+pktVal.split(':')[1]]||{}).unit||"":"",
        qty:invQty, unit:ref.unit, // primary qty for legacy compat
        price:price, value:pktQty>0?pktQty*price:0, // value = packet qty × price only
        stockAfter:avail-invQty
      });
      totalVal+=pktQty>0?pktQty*price:0; // packet qty × price only
    } else if(pktVal&&pktQty>0&&!invVal){
      // Packet-only row
      var parts=pktVal.split(":");
      var ref=S.pkt[+parts[1]];
      if(!ref){errors.push("Row "+(i+1)+" packet: invalid");continue;}
      var origPktQty=0;
      if(idx!=null&&S.ord[idx]&&S.ord[idx].items){
        S.ord[idx].items.forEach(function(oi){if(oi.pktSrcKey===pktVal)origPktQty=oi.pktQty||0;});
      }
      var pavail=ref.qty+origPktQty;
      if(pktQty>pavail){errors.push("Row "+(i+1)+" packet: only "+N(pavail)+" "+ref.unit+" of "+ref.name+" available");continue;}
      items.push({
        invSrcKey:"", pktSrcKey:pktVal,
        product:ref.name, lot:"", pktType:ref.type,
        orderType:"packet",
        invQty:0, invUnit:"",
        pktQty:pktQty, pktUnit:ref.unit,
        qty:pktQty, unit:ref.unit,
        price:price, value:pktQty*price,
        stockAfter:pavail-pktQty
      });
      totalVal+=pktQty*price;
    }
    // If both invVal and pktVal are set but invQty=0, add packet portion separately
    if(invVal&&pktVal&&pktQty>0&&invQty<=0){
      var pp=S.pkt[+pktVal.split(':')[1]];
      if(pp){
        var origPQ=0;
        if(idx!=null&&S.ord[idx]&&S.ord[idx].items){
          S.ord[idx].items.forEach(function(oi){if(oi.pktSrcKey===pktVal)origPQ=oi.pktQty||0;});
        }
        var pav=pp.qty+origPQ;
        if(pktQty<=pav){
          // Merge into last item or add separately
          if(items.length&&items[items.length-1].invSrcKey===invVal){
            items[items.length-1].pktSrcKey=pktVal;
            items[items.length-1].pktQty=pktQty;
            items[items.length-1].pktUnit=pp.unit;
            items[items.length-1].pktType=pp.type;
          }
        }
      }
    }
  }

  if(errors.length){toast("⚠ "+errors.slice(0,3).join(" | "),"warn");return;}
  if(!items.length){toast("Add at least one item with a product or packet and quantity","warn");return;}

  // ── Restore original stock if editing (before deducting new)
  if(idx!=null&&S.ord[idx]&&S.ord[idx].items){
    S.ord[idx].items.forEach(function(oi){
      if(oi.invSrcKey){var r=S.inv[+oi.invSrcKey.split(':')[1]];if(r)r.qty=Math.round((r.qty+(oi.invQty||oi.qty||0))*1000)/1000;}
      if(oi.pktSrcKey){var r=S.pkt[+oi.pktSrcKey.split(':')[1]];if(r)r.qty=Math.round((r.qty+(oi.pktQty||(!oi.invSrcKey?oi.qty:0)||0))*1000)/1000;}
      if(oi.unit==="kg"||oi.invUnit==="kg"){var pt=S.pattri.find(function(p){return p.name===oi.product;});if(pt)pt.netWeight=Math.max(0,Math.round(((pt.netWeight||0)+(oi.invQty||oi.qty||0))*1000)/1000);}
    });
    // Restore box stock
    if(S.ord[idx].boxType&&S.ord[idx].boxQty>0){
      var ob=S.boxes.find(function(b){return b.name===S.ord[idx].boxType;});
      if(ob)ob.qty+=S.ord[idx].boxQty;
    }
  }

  // ── Deduct stock for all items
  items.forEach(function(it){
    if(it.invSrcKey&&it.invQty>0){
      var r=S.inv[+it.invSrcKey.split(':')[1]];
      if(r){r.qty=Math.max(0,Math.round((r.qty-it.invQty)*1000)/1000);}
      if(it.invUnit==="kg"||it.unit==="kg"){
        var pt=S.pattri.find(function(p){return p.name===it.product;});
        if(pt){pt.netWeight=Math.max(0,Math.round(((pt.netWeight||0)-it.invQty)*1000)/1000);}
      }
    }
    if(it.pktSrcKey&&it.pktQty>0){
      var r=S.pkt[+it.pktSrcKey.split(':')[1]];
      if(r){r.qty=Math.max(0,Math.round((r.qty-it.pktQty)*1000)/1000);}
    }
  });

  // ── Box stock deduction
  var boxIdx=(document.getElementById("m-box-type")||{value:""}).value;
  var boxQty=parseFloat((document.getElementById("m-box-qty")||{value:0}).value)||0;
  var boxName="";
  if(boxIdx!==""&&boxQty>0&&S.boxes[+boxIdx]){
    var bref=S.boxes[+boxIdx];
    if(boxQty>bref.qty){toast("⚠ Not enough boxes — only "+N(bref.qty)+" "+bref.name+" available","warn");return;}
    bref.qty=Math.max(0,bref.qty-boxQty);
    boxName=bref.name;
  }

  var ordId=ordIdInput||(idx==null?"ORD-"+String(S.seq).padStart(4,"0"):S.ord[idx].id);
  // ── Log movements
  items.forEach(function(it){
    if(it.invQty>0) logMove("out",it.product,it.invQty,it.invUnit||it.unit,ordId,"Customer Order — "+cust+(it.lot?" lot "+it.lot:""));
    if(it.pktQty>0) logMove("out",it.product+" (pkt)",it.pktQty,it.pktUnit||it.unit,ordId,"Customer Order (packet) — "+cust);
  });
  if(boxName) logMove("out","Box: "+boxName,boxQty,"box",ordId,"Order box usage");

  // ── Build order record
  var o={id:ordId,customer:cust,items:items,
    orderType:items[0].orderType,product:items[0].product,lot:items[0].lot,pktType:items[0].pktType,
    qty:items.reduce(function(a,it){return a+it.qty;},0),unit:items[0].unit,
    price:items[0].price,value:totalVal,
    boxType:boxName,boxQty:boxQty,
    date:date,expiry:expiry,apptDate:apptDate,deliveryApptDate:deliveryApptDate,dispatchDate:dispatchDate,
    fromLoc:fromLoc,toLoc:toLoc,
    pickupName:pickupName,pickupPhone:pickupPhone,
    deliveryName:deliveryName,deliveryPhone:deliveryPhone,
    status:status,delivery:delivery,
    stockAfter:items[0].stockAfter,notes:notes};
  logHistory(idx==null?"place_order":"edit_order",cust,"Order="+ordId+", items="+items.length+", value=₹"+N(totalVal));
  if(idx==null){S.ord.push(o);S.seq++;}else S.ord[idx]=o;
  closeM();schedSave();render();
  toast(idx==null?ordId+" placed — "+items.length+" row(s) ✓":ordId+" updated ✓","ok");
}


function cancelOrder(i){
  if(!confirm("Cancel this order and restore all stock?"))return;
  var o=S.ord[i];
  if(o.status==="cancelled"){toast("Already cancelled","info");return;}
  _pushUndo("Cancel order "+o.id,["ord","inv","pkt","boxes","pattri"]);

  var itemList=o.items||[];
  // Legacy single-item orders
  if(!itemList.length){
    if(o.orderType==="packet")  itemList=[{pktSrcKey:"",pktQty:o.qty,pktUnit:o.unit,product:o.product,pktType:o.pktType}];
    else                        itemList=[{invSrcKey:"",invQty:o.qty,invUnit:o.unit,product:o.product,lot:o.lot,unit:o.unit}];
  }

  itemList.forEach(function(it){
    // ── Restore inventory product stock
    var invQty = it.invQty || (!it.pktSrcKey ? it.qty : 0) || 0;
    if(invQty>0){
      var invRef = it.invSrcKey
        ? S.inv[+it.invSrcKey.split(':')[1]]
        : (S.inv.find(function(r){return r.name===it.product&&r.lot===it.lot;})||S.inv.find(function(r){return r.name===it.product;}));
      if(invRef){
        invRef.qty=Math.round((invRef.qty+invQty)*1000)/1000;
        logMove("in",invRef.name,invQty,it.invUnit||it.unit||invRef.unit,o.id,"Order Cancelled — stock restored");
      }
      // Restore pattri
      var invUnit=it.invUnit||it.unit||"";
      if(invUnit==="kg"||invUnit==="litre"){
        var pt=S.pattri.find(function(p){return p.name===it.product;});
        if(pt)pt.netWeight=Math.max(0,Math.round(((pt.netWeight||0)+invQty)*1000)/1000);
      }
    }
    // ── Restore packet stock
    var pktQty = it.pktQty || (it.orderType==="packet"?it.qty:0) || 0;
    if(pktQty>0){
      var pktRef = it.pktSrcKey
        ? S.pkt[+it.pktSrcKey.split(':')[1]]
        : S.pkt.find(function(r){return r.name===it.product&&r.type===it.pktType;});
      if(pktRef){
        pktRef.qty=Math.round((pktRef.qty+pktQty)*1000)/1000;
        logMove("in",pktRef.name+" (pkt)",pktQty,it.pktUnit||pktRef.unit,o.id,"Order Cancelled — packet stock restored");
      }
    }
  });

  // Restore box stock
  if(o.boxType&&o.boxQty>0){
    var bref=S.boxes.find(function(b){return b.name===o.boxType;});
    if(bref){bref.qty+=o.boxQty;logMove("in","Box: "+o.boxType,o.boxQty,"box",o.id,"Order Cancelled — boxes restored");}
  }
  o.status="cancelled";
  logHistory("cancel_order",o.customer,"Order="+o.id+" cancelled, all stock restored");
  schedSave();render();toast("Order "+o.id+" cancelled — stock fully restored ✓","info");
}

function saveLot(){
  var pi=+gv("m-lprod"),code=gv("m-lcode").trim(),active=gv("m-lactive")==="1";
  var mfd=gv("m-lmfd"),exp=gv("m-lexp");
  var rcvQty=parseFloat(gv("m-lqty"))||0;
  var rcvUnit=gv("m-lunit")||"kg";
  if(!code){toast("Enter a lot code","warn");return;}
  if(S.lot[pi].lots.includes(code)){toast("Lot already exists","warn");return;}
  _pushUndo("Add lot via modal",["lot","inv","pattri"]);
  if(!S.lot[pi].lotDates)S.lot[pi].lotDates={};
  // Store per-lot received qty and unit
  S.lot[pi].lotDates[code]={
    mfd:mfd||"",exp:exp||"",
    receivedQty:rcvQty,
    receivedUnit:rcvUnit,
    lastReceivedDate:window.today()
  };
  S.lot[pi].lots.push(code);
  if(active){
    S.lot[pi].current=code;
    var invProd=S.inv.find(function(p){return p.name===S.lot[pi].name;});
    if(invProd){
      if(mfd)invProd.mfd=mfd;
      if(exp)invProd.exp=exp;
      invProd.lot=code;
      // Add received qty to inventory stock
      if(rcvQty>0){
        var prev=invProd.qty;
        invProd.qty=Math.round((prev+rcvQty)*1000)/1000;
        logMove("in",invProd.name,rcvQty,rcvUnit,"New Lot "+code,"Lot received, added to stock ("+N(prev)+"→"+N(invProd.qty)+")");
        // Sync pattri if weight product
        if(rcvUnit==="kg"||invProd.unit==="kg"){
          var pt=S.pattri.find(function(p){return p.name===invProd.name;});
          if(pt){pt.netWeight=Math.round(((pt.netWeight||0)+rcvQty)*1000)/1000;}
        }
      }
    } else if(rcvQty>0){
      // No inventory entry yet — create one
      S.inv.push({id:"P"+uid(),name:S.lot[pi].name,lot:code,cat:"Product",qty:rcvQty,minQty:CFG.lowThresh,unit:rcvUnit,mfd:mfd||"",exp:exp||"",cost:0});
      logMove("in",S.lot[pi].name,rcvQty,rcvUnit,"New Lot "+code,"New product entry created from lot");
    }
  }
  var detail="lot="+code+(rcvQty?", qty="+N(rcvQty)+" "+rcvUnit:"")+(mfd?", mfd="+mfd:"")+(exp?", exp="+exp:"")+(active?" (set as current)":"");
  logHistory("add_lot",S.lot[pi].name,detail);
  closeM();schedSave();render();
  toast("Lot "+code+" added"+(rcvQty?" · "+N(rcvQty)+" "+rcvUnit+" recorded":"")+(active?" · set as current · stock updated":"")+" ✓","ok");
}

function addLotInline(li){
  var code=(document.getElementById("lc-"+li)||{value:""}).value.trim();
  var setCur=(document.getElementById("la-set-"+li)||{value:"1"}).value==="1";
  var mfd=(document.getElementById("la-mfd-"+li)||{value:""}).value;
  var exp=(document.getElementById("la-exp-"+li)||{value:""}).value;
  if(!code){toast("Enter a lot code","warn");return;}
  if(S.lot[li].lots.includes(code)){toast("Lot already exists","warn");return;}
  _pushUndo("Add lot "+code,["lot","inv"]);
  S.lot[li].lots.push(code);
  if(!S.lot[li].lotDates)S.lot[li].lotDates={};
  var initQty=parseFloat((document.getElementById("la-qty-"+li)||{value:0}).value)||0;
  var initUnit=(document.getElementById("la-unit-"+li)||{value:""}).value||"kg";
  S.lot[li].lotDates[code]={mfd:mfd||"",exp:exp||"",receivedQty:initQty||0,receivedUnit:initUnit||"",lastReceivedDate:window.today()};
  if(setCur){
    S.lot[li].current=code;
    // Feature 3: sync dates and qty to inventory product
    var invProd=S.inv.find(function(p){return p.name===S.lot[li].name;});
    if(invProd){
      if(mfd)invProd.mfd=mfd;
      if(exp)invProd.exp=exp;
      invProd.lot=code;
      // If initial qty received, add to inventory
      if(initQty>0&&invProd.unit===(initUnit||invProd.unit)){
        invProd.qty=Math.round((invProd.qty+initQty)*1000)/1000;
        logMove("in",invProd.name,initQty,initUnit||invProd.unit,"New Lot "+code,"Added with lot");
      }
    } else if(initQty>0) {
      // Create new inventory entry
      S.inv.push({id:"P"+uid(),name:S.lot[li].name,lot:code,cat:"Product",qty:initQty,minQty:CFG.lowThresh,unit:initUnit||"kg",mfd:mfd||"",exp:exp||"",cost:0});
      logMove("in",S.lot[li].name,initQty,initUnit||"kg","New Lot "+code,"New lot entry");
    }
  }
  logHistory("add_lot",S.lot[li].name,"lot="+code+(mfd?", mfd="+mfd:"")+(exp?", exp="+exp:"")+(setCur?" (current, dates synced)":""));
  schedSave();render();toast("Lot "+code+" added"+(setCur?" — dates synced to product":"")+" ✓","ok");
}

function saveBulkInv(){

    var mfd=(document.getElementById("b-mfd-"+i)||{value:""}).value;
    var exp=(document.getElementById("b-exp-"+i)||{value:""}).value;
    var mn=parseFloat((document.getElementById("b-min-"+i)||{value:0}).value)||CFG.lowThresh;
    S.inv.push({id:"P"+uid(),name:nm,lot:lt,cat:"Product",qty:qt,minQty:mn,unit:unit,mfd:mfd,exp:exp,cost:0});
    logMove("in",nm,qt,unit,"Bulk Add","Bulk stock entry");
    added++;
  }
  if(!added){toast("No valid rows found — fill Name, Lot and Qty","warn");return;}
  closeM();schedSave();render();
  toast("Added "+added+" product(s)"+(skipped?" ("+skipped+" empty rows skipped)":"")+" ✓","ok");
}

function savePattri(idx){
  var nm=gv("m-pt-name").trim(),wt=parseFloat(gv("m-pt-wt"))||0,unit=gv("m-pt-unit"),packType=gv("m-pt-packtype").trim(),notes=gv("m-pt-notes").trim();
  if(!nm){toast("Product name required","warn");return;}
  var r={id:idx!=null?S.pattri[idx].id:"PT"+uid(),name:nm,netWeight:wt,unit:unit,packType:packType,notes:notes};
  if(idx==null)S.pattri.push(r);else S.pattri[idx]=r;
  logHistory(idx==null?"add_pattri":"edit_pattri",r.name,"netWeight="+N(r.netWeight)+" "+r.unit);
  closeM();schedSave();render();toast(idx==null?"Pattri product added ✓":"Pattri updated ✓","ok");
}

function doAdjPattri(idx){
  _pushUndo("Adjust pattri",["pattri"]);
  var r=S.pattri[idx],t=gv("pt-adj-type"),amt=parseFloat(gv("pt-adj-amt"))||0,note=gv("pt-adj-note");
  if(!amt){toast("Enter an amount","warn");return;}
  if(t==="add")r.netWeight=(r.netWeight||0)+amt;
  else if(t==="remove")r.netWeight=Math.max(0,(r.netWeight||0)-amt);
  else r.netWeight=amt;
  r.netWeight=Math.round(r.netWeight*1000)/1000;
  logMove(t==="remove"?"out":"in",r.name,amt,r.unit,"Pattri Adjust",note||t);
  logHistory("adjust_pattri",r.name,t+": "+N(amt)+" "+r.unit+(note?" — "+note:""));
  closeM();schedSave();render();toast("Pattri weight updated: "+N(r.netWeight)+" "+r.unit+" ✓","ok");
}

function saveBoxInv(idx){
  var nm=gv("m-bx-name").trim(),qty=parseFloat(gv("m-bx-qty"))||0,cap=parseFloat(gv("m-bx-cap"))||0,unit=gv("m-bx-unit")||"box",notes=gv("m-bx-notes").trim();
  if(!nm){toast("Box type name required","warn");return;}
  var r={id:idx!=null?S.boxes[idx].id:"B"+uid(),name:nm,qty:qty,capacity:cap,unit:unit,notes:notes};
  if(idx==null)S.boxes.push(r);else S.boxes[idx]=r;
  logHistory(idx==null?"add_box":"edit_box",r.name,"qty="+N(r.qty)+", capacity="+r.capacity);
  closeM();schedSave();render();toast(idx==null?"Box type added ✓":"Box updated ✓","ok");
}

function doAdjBoxInv(idx){
  _pushUndo("Adjust box stock",["boxes"]);
  var r=S.boxes[idx],t=gv("bx-adj-type"),q=parseFloat(gv("bx-adj-qty"))||0,note=gv("bx-adj-note");
  if(!q){toast("Enter a quantity","warn");return;}
  if(t==="add")r.qty+=q;
  else if(t==="remove")r.qty=Math.max(0,r.qty-q);
  else r.qty=q;
  logMove(t==="remove"?"out":"in","Box: "+r.name,q,"box","Box Adjust",note||t);
  logHistory("adjust_box",r.name,t+": "+N(q)+" boxes"+(note?" — "+note:""));
  closeM();schedSave();render();toast("Box stock updated: "+N(r.qty)+" boxes ✓","ok");
}
